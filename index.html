  function settingRow(label,desc,control){
    return <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12,padding:"13px 0",borderTop:"1px solid var(--line)"}}>
      <div style={{minWidth:0,flex:1}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:15}}>{label}</div>
        {desc&&<div style={{fontSize:12,color:"var(--muted)",marginTop:2,lineHeight:1.4}}>{desc}</div>}
      </div>
      <div style={{flexShrink:0}}>{control}</div>
    </div>;
  }

  /* ── Kalender (Stufe 1: nur für mich) ── */
  function apptStudentName(a){
    if(!a.student_id) return "";
    const s=students.find(x=>x.id===a.student_id);
    return s?dispName(s):"";
  }
  function openNewAppt(dateStr){
    setApptForm({ id:null, date:dateStr||ymd(new Date()), start:"09:00", end:"10:00", student_id:"", note:"", title:"" });
  }
  function openEditAppt(a){
    setApptForm({ id:a.id, date:ymd(a.start_at), start:hm(a.start_at), end:a.end_at?hm(a.end_at):"",
      student_id:a.student_id||"", note:a.note||"", title:a.title||"", start_at:a.start_at, status:a.status });
  }
  async function saveApptForm(){
    const f=apptForm; if(!f) return;
    if(!f.date||!f.start){ alert("Bitte Datum und Startzeit angeben."); return; }
    const startISO=combineDT(f.date,f.start);
    const endISO=f.end?combineDT(f.date,f.end):null;
    // Überschneidungswarnung
    const clash=findOverlaps(appts,startISO,endISO,f.id);
    if(clash.length){
      const c=clash[0];
      const cname=apptStudentName(c)||c.title||"Termin";
      const txt="Achtung: Dieser Termin überschneidet sich mit einem bestehenden:\n\n"
        +fmtDLong(c.start_at)+", "+hm(c.start_at)+(c.end_at?" – "+hm(c.end_at):"")+" Uhr · "+cname
        +"\n\nTrotzdem speichern?";
      if(!confirm(txt)) return;
    }
    const payload={
      start_at:startISO,
      end_at:endISO,
      student_id:f.student_id||null,
      note:f.note||"",
      title:f.title||"",
      status:"confirmed"
    };
    if(f.id){ await updateAppt(f.id,payload); }
    else { await addAppt(payload); }
    setApptForm(null);
  }

  function renderKalender(){
    const days=[0,1,2,3,4,5,6].map(i=>addDays(calWeek,i));
    const weekEnd=addDays(calWeek,6);
    const byDay={};
    appts.forEach(a=>{ const k=ymd(a.start_at); (byDay[k]=byDay[k]||[]).push(a); });
    const weekLabel=dayMonth(calWeek)+" – "+dayMonth(weekEnd)+"."+new Date(weekEnd).getFullYear();
    const dayLabel=new Date(calDay).toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
    const pending=appts.filter(a=>a.status==="pending").sort((a,b)=>a.start_at.localeCompare(b.start_at));

    // UE-Zählung: 1 UE = 45 Minuten, nur bestätigte Termine. Ohne Endzeit = 45 Min = 1 UE.
    function ueOf(a){
      const start=new Date(a.start_at).getTime();
      const end=a.end_at?new Date(a.end_at).getTime():start+45*60000;
      const mins=Math.max(45,Math.round((end-start)/60000));
      return mins/45;
    }
    function sumUE(list){ return list.reduce((sum,a)=>sum+ueOf(a),0); }
    const weekStartT=calWeek.getTime();
    const weekEndT=addDays(calWeek,7).getTime();
    const confirmed=appts.filter(a=>a.status==="confirmed");
    const weekAppts=confirmed.filter(a=>{ const t=new Date(a.start_at).getTime(); return t>=weekStartT&&t<weekEndT; });
    const monthRef=new Date(calWeek); // Monat der gezeigten Woche
    const monthAppts=confirmed.filter(a=>{ const d=new Date(a.start_at); return d.getMonth()===monthRef.getMonth()&&d.getFullYear()===monthRef.getFullYear(); });
    const weekUE=sumUE(weekAppts);
    const monthUE=sumUE(monthAppts);
    const fmtUE=n=>Number.isInteger(n)?String(n):n.toFixed(1).replace(".",",");

    // Eine Tageskarte rendern (wird in Wochen- und Tagesansicht genutzt)
    function dayCard(d,opts){
      const k=ymd(d);
      const list=(byDay[k]||[]).sort((a,b)=>a.start_at.localeCompare(b.start_at));
      const today=isToday(d);
      const showHead=!opts||!opts.noHead;
      return <div key={k} className="card" style={{marginBottom:10,overflow:"hidden",
        border:today?"2px solid var(--orange)":undefined}}>
        {showHead&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"10px 14px",background:today?"var(--orange-soft)":"var(--field-bg)",borderBottom:"1px solid var(--line)"}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <span style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,textTransform:"capitalize"}}>{weekdayShort(d)}</span>
            <span style={{fontSize:13,color:"var(--muted)"}}>{dayMonth(d)}.</span>
            {today&&<span style={{fontSize:10.5,fontWeight:700,color:"var(--orange-deep)",textTransform:"uppercase",letterSpacing:".05em"}}>Heute</span>}
          </div>
          <button onClick={()=>openNewAppt(k)} aria-label="Termin an diesem Tag"
            style={{width:30,height:30,borderRadius:8,border:"1.5px solid var(--line)",background:"var(--card)",
              fontSize:18,lineHeight:1,color:"var(--orange-deep)",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>+</button>
        </div>}
        {list.length===0
          ? <div style={{padding:"12px 14px",fontSize:13,color:"var(--muted)"}}>keine Termine</div>
          : <div>{list.map(a=>{
              const pend=a.status==="pending";
              const name=apptStudentName(a);
              return <button key={a.id} onClick={()=>openEditAppt(a)}
                style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"11px 14px",textAlign:"left",
                  borderTop:"1px solid var(--line)",background:"var(--card)"}}>
                <div style={{minWidth:52,fontFamily:"var(--font-d)",fontWeight:800,fontSize:13.5,fontVariantNumeric:"tabular-nums",color:pend?"var(--amber)":"var(--orange-deep)"}}>
                  {hm(a.start_at)}{a.end_at?<div style={{fontWeight:500,fontSize:11,color:"var(--muted)"}}>{hm(a.end_at)}</div>:null}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14.5,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                    {name||a.title||"Termin"}
                  </div>
                  {a.note&&<div style={{fontSize:12,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{a.note}</div>}
                </div>
                {pend&&<span style={{flexShrink:0,fontSize:10.5,fontWeight:700,color:"var(--amber)",
                  background:"var(--amber-bg)",borderRadius:6,padding:"3px 7px",textTransform:"uppercase"}}>offen</span>}
              </button>;
            })}</div>}
      </div>;
    }

    return <div className="pad">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"2px 2px 14px"}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:21,lineHeight:1}}>Kalender</h2>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:3}}>{calMode==="tag"?dayLabel:weekLabel}</div>
        </div>
        <button className="btn btn-primary" onClick={()=>openNewAppt(calMode==="tag"?ymd(calDay):undefined)}>+ Termin</button>
      </div>

      {/* Umschalter Woche / Tag */}
      <div className="seg" style={{marginBottom:12}}>
        <button className={calMode==="woche"?"on":""} onClick={()=>setCalMode("woche")}>Woche</button>
        <button className={calMode==="tag"?"on":""} onClick={()=>setCalMode("tag")}>Tag</button>
      </div>

      {/* UE-Übersicht: Woche und Monat (nur bestätigte Termine, 1 UE = 45 Min) */}
      <div style={{display:"flex",gap:10,marginBottom:12}}>
        <div className="card" style={{flex:1,padding:"12px 14px",textAlign:"center"}}>
          <div style={{fontSize:10.5,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",color:"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
            Diese Woche <Help text="UE = Unterrichtseinheit. 1 UE sind 45 Minuten. Gezählt werden nur bestätigte Termine."/>
          </div>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:24,color:"var(--orange-deep)",marginTop:2}}>{fmtUE(weekUE)} <span style={{fontSize:13,color:"var(--muted)"}}>UE</span></div>
          <div style={{fontSize:11,color:"var(--muted)"}}>{fmtUE(weekUE*0.75)} Std.</div>
        </div>
        <div className="card" style={{flex:1,padding:"12px 14px",textAlign:"center"}}>
          <div style={{fontSize:10.5,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",color:"var(--muted)"}}>
            {new Date(calWeek).toLocaleDateString("de-DE",{month:"long"})}
          </div>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:24,color:"var(--ink)",marginTop:2}}>{fmtUE(monthUE)} <span style={{fontSize:13,color:"var(--muted)"}}>UE</span></div>
          <div style={{fontSize:11,color:"var(--muted)"}}>{fmtUE(monthUE*0.75)} Std.</div>
        </div>
      </div>

      {/* Buchungslink für Schüler */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <button className="btn btn-ghost" style={{flex:1,justifyContent:"flex-start",gap:9}}
          onClick={shareBooking}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Buchungslink an Schüler senden
        </button>
        <Help text="Diesen Link gibst du deinen Schülern. Sie können dir darüber Wunschtermine vorschlagen, die du dann bestätigst."/>
      </div>

      {/* Offene Vorschläge */}
      {pending.length>0&&<div className="card" style={{marginBottom:14,overflow:"hidden",border:"2px solid var(--amber)"}}>
        <div style={{padding:"10px 14px",background:"var(--amber-bg)",borderBottom:"1px solid var(--line)",
          fontFamily:"var(--font-d)",fontWeight:800,fontSize:14,color:"#8A5A00"}}>
          {pending.length} offene{pending.length===1?"r":""} Terminvorschlag{pending.length===1?"":"e"}
        </div>
        {pending.map(a=>
          <div key={a.id} style={{padding:"12px 14px",borderTop:"1px solid var(--line)"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:2}}>
              <span style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:14}}>{fmtDLong(a.start_at)}</span>
            </div>
            <div style={{fontSize:13.5,marginBottom:2}}>
              {hm(a.start_at)}{a.end_at?" – "+hm(a.end_at):""} Uhr · {a.title||"Schüler"}
            </div>
            {a.note&&<div style={{fontSize:12.5,color:"var(--muted)",marginBottom:8}}>{a.note}</div>}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <button className="btn btn-primary" style={{flex:1,padding:"9px",fontSize:13.5}} onClick={()=>confirmAppt(a.id)}>✓ Bestätigen</button>
              <button className="btn btn-ghost" style={{flex:1,padding:"9px",fontSize:13.5,color:"#B3362A"}} onClick={()=>rejectAppt(a.id)}>Ablehnen</button>
            </div>
          </div>)}
      </div>}

      {calMode==="woche" ? <>
        {/* Wochen-Navigation */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setCalWeek(addDays(calWeek,-7))}>‹</button>
          <button className="btn btn-ghost" style={{flex:1,padding:"8px"}} onClick={()=>setCalWeek(startOfWeek(new Date()))}>Diese Woche</button>
          <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setCalWeek(addDays(calWeek,7))}>›</button>
        </div>
        {days.map(d=>dayCard(d))}
      </> : <>
        {/* Tages-Navigation */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setCalDay(addDays(calDay,-1))}>‹</button>
          <button className="btn btn-ghost" style={{flex:1,padding:"8px"}} onClick={()=>{ const d=new Date(); d.setHours(0,0,0,0); setCalDay(d); }}>Heute</button>
          <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setCalDay(addDays(calDay,1))}>›</button>
        </div>
        {dayCard(calDay)}
      </>}

      <p style={{fontSize:11.5,color:"var(--muted)",textAlign:"center",marginTop:6,lineHeight:1.5}}>
        Tippe auf einen Termin zum Bearbeiten.
      </p>
    </div>;
  }

  function loadAdmin(){
    setAdminBusy(true);
    adminFetchSchools().then(list=>{ setAdminSchools(list); setAdminBusy(false); })
      .catch(e=>{ setAdminBusy(false); alert("Konnte Fahrschulen nicht laden:\n"+e.message+"\n\nHast du den Admin-SQL-Block ausgeführt?"); });
  }
  // Neue Fahrschule direkt im Admin-Bereich anlegen
  async function adminAddSchool(){
    const name=prompt("Name der neuen Fahrschule:");
    if(name===null) return;
    if(!name.trim()){ alert("Bitte einen Namen eingeben."); return; }
    setAdminBusy(true);
    try{
      const created=await createSchool(name.trim());
      // mit Zähler-Feldern in die Liste aufnehmen, damit die Anzeige passt
      setAdminSchools(prev=>[{...created,teachers:0,students:0},...(prev||[])]);
    }catch(e){ alert("Fahrschule anlegen fehlgeschlagen:\n"+e.message); }
    setAdminBusy(false);
  }
  async function adminDoSave(){
    if(!adminEdit) return;
    try{
      await adminSaveSchool(adminEdit);
      setAdminSchools(prev=>(prev||[]).map(s=>s.id===adminEdit.id?{...s,...adminEdit}:s));
      // falls es die eigene Fahrschule ist, auch oben aktualisieren
      if(school&&school.id===adminEdit.id) writeSchool({...school,name:adminEdit.name,subtitle:adminEdit.subtitle,color:adminEdit.color});
      setAdminEdit(null);
    }catch(e){ alert("Speichern fehlgeschlagen:\n"+e.message); }
  }
  async function adminDoDelete(sc){
    if(!confirm('Fahrschule "'+sc.name+'" wirklich löschen?\n\nAchtung: Die zugeordneten Fahrlehrer verlieren ihre Fahrschul-Zuordnung. Schülerdaten bleiben erhalten, aber ohne Fahrschule. Das kann nicht rückgängig gemacht werden.')) return;
    try{
      await adminDeleteSchool(sc.id);
      setAdminSchools(prev=>(prev||[]).filter(s=>s.id!==sc.id));
    }catch(e){ alert("Löschen fehlgeschlagen:\n"+e.message); }
  }
  function openTeachers(sc){
    setAdminTeachers({school:sc,list:null});
    adminFetchTeachers(sc.id).then(list=>setAdminTeachers({school:sc,list}))
      .catch(e=>{ alert("Fahrlehrer konnten nicht geladen werden:\n"+e.message); setAdminTeachers(null); });
  }
  async function detachTeacher(uid,email){
    if(!confirm('Fahrlehrer "'+email+'" stilllegen?\n\nSeine Fahrschul-Zuordnung wird entfernt. Er kann sich noch anmelden, sieht aber keine Fahrschule mehr. Seine Schülerdaten bleiben erhalten.')) return;
    try{
      await adminDetachTeacher(uid);
      setAdminTeachers(prev=>prev?{...prev,list:(prev.list||[]).filter(t=>t.id!==uid)}:prev);
      // Zähler in der Fahrschulliste anpassen
      setAdminSchools(prev=>(prev||[]).map(s=>s.id===(adminTeachers&&adminTeachers.school.id)?{...s,teachers:Math.max(0,s.teachers-1)}:s));
    }catch(e){ alert("Stilllegen fehlgeschlagen:\n"+e.message); }
  }
  async function toggleTeacherAdmin(uid,current){
    try{
      await adminSetTeacherAdmin(uid,!current);
      setAdminTeachers(prev=>prev?{...prev,list:(prev.list||[]).map(t=>t.id===uid?{...t,school_admin:!current}:t)}:prev);
      // falls ich mich selbst betreffe, eigenes Recht aktualisieren
      if(uid===session.user.id) setIsSchoolAdmin(!current);
    }catch(e){ alert("Konnte das Recht nicht ändern:\n"+e.message); }
  }
  // Schülerliste eines Fahrlehrers öffnen (nur ansehen)
  async function openTeacherStudents(teacher){
    setAdminTeacherStudents({teacher, list:null});
    try{
      const list=await adminFetchTeacherStudents(teacher.id);
      setAdminTeacherStudents({teacher, list});
    }catch(e){
      setAdminTeacherStudents({teacher, list:[], error:e.message});
    }
  }
  async function adminLogoFile(e,sc){
    const file=e.target.files&&e.target.files[0];
    e.target.value="";
    if(!file) return;
    if(file.size>8*1024*1024){ alert("Bild ist zu groß (max. 8 MB)."); return; }
    try{
      const dataUrl=await resizeImageToDataURL(file,256);
      await adminSaveSchoolLogo(sc.id,dataUrl);
      setAdminSchools(prev=>(prev||[]).map(s=>s.id===sc.id?{...s,logo:dataUrl}:s));
      if(adminEdit&&adminEdit.id===sc.id) setAdminEdit({...adminEdit,logo:dataUrl});
      if(school&&school.id===sc.id) writeSchool({...school,logo:dataUrl});
    }catch(err){ alert("Logo konnte nicht gesetzt werden:\n"+err.message); }
  }
  async function adminRemoveLogo(sc){
    if(!confirm("Logo dieser Fahrschule entfernen?")) return;
    try{
      await adminSaveSchoolLogo(sc.id,"");
      setAdminSchools(prev=>(prev||[]).map(s=>s.id===sc.id?{...s,logo:""}:s));
      if(adminEdit&&adminEdit.id===sc.id) setAdminEdit({...adminEdit,logo:""});
      if(school&&school.id===sc.id) writeSchool({...school,logo:""});
    }catch(err){ alert("Logo konnte nicht entfernt werden:\n"+err.message); }
  }

  function renderAdmin(){
    return <div className="pad">
      <div style={{display:"flex",alignItems:"center",gap:10,margin:"2px 2px 14px"}}>
        <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setView("einstellungen")}>‹ Zurück</button>
        <h2 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:21}}>Admin · Fahrschulen</h2>
      </div>

      {adminSchools===null
        ? <div className="card" style={{padding:"22px 16px",textAlign:"center"}}>
            <div style={{fontSize:13.5,color:"var(--muted)",marginBottom:14}}>Lade alle Fahrschulen, um sie zu verwalten.</div>
            <button className="btn btn-primary" disabled={adminBusy} onClick={loadAdmin}>{adminBusy?"Lädt…":"Fahrschulen laden"}</button>
          </div>
        : <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:13,color:"var(--muted)"}}>{adminSchools.length} Fahrschulen</span>
              <button className="btn btn-ghost" style={{padding:"7px 12px",fontSize:13}} disabled={adminBusy} onClick={loadAdmin}>Aktualisieren</button>
            </div>
            <button className="btn btn-primary btn-block" style={{marginBottom:14}} disabled={adminBusy} onClick={adminAddSchool}>+ Fahrschule hinzufügen</button>
            {adminSchools.map(sc=>
              <div key={sc.id} className="card" style={{padding:"13px 14px",marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:11}}>
                  <div style={{width:38,height:38,borderRadius:9,background:sc.color||"#ccc",flexShrink:0,
                    border:"2px solid var(--ink)"}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:16,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sc.name}</div>
                    <div style={{fontSize:12,color:"var(--muted)"}}>{sc.subtitle||"—"}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:14,margin:"10px 0",fontSize:12.5,color:"var(--ink-2)"}}>
                  <span><b style={{fontFamily:"var(--font-d)"}}>{sc.teachers}</b> Fahrlehrer</span>
                  <span><b style={{fontFamily:"var(--font-d)"}}>{sc.students}</b> Schüler</span>
                  <span>{sc.logo?"eigenes Logo":"Standard-Logo"}</span>
                </div>
                <div style={{display:"flex",gap:8,marginBottom:8}}>
                  <button className="btn btn-ghost" style={{flex:1,padding:"8px",fontSize:13}}
                    onClick={()=>openTeachers(sc)}>Fahrlehrer</button>
                  <button className="btn btn-ghost" style={{flex:1,padding:"8px",fontSize:13}}
                    onClick={()=>setAdminEdit({id:sc.id,name:sc.name,subtitle:sc.subtitle||"",color:sc.color||"#FF9300",logo:sc.logo||""})}>Bearbeiten</button>
                </div>
                <button className="btn btn-ghost btn-block" style={{padding:"8px",fontSize:13,color:"#B3362A"}}
                  onClick={()=>adminDoDelete(sc)}>Fahrschule löschen</button>
              </div>)}
          </div>}
    </div>;
  }

  function renderEinstellungen(){
    const myStudents=students.filter(s=>s._isMine).length;
    const sharedStudents=students.filter(s=>!s._isMine).length;
    // Fahrschul-Einstellungen darf nur ein Fahrschul-Admin oder der zentrale Admin ändern
    const canEditSchool = isAdmin(session) || isSchoolAdmin;
    async function onLogoFile(e){
      const file=e.target.files&&e.target.files[0];
      e.target.value=""; // erlaubt erneutes Wählen derselben Datei
      if(!file||!school) return;
      if(file.size>8*1024*1024){ alert("Bild ist zu groß (max. 8 MB)."); return; }
      try{
        const dataUrl=await resizeImageToDataURL(file,256);
        writeSchool({...school,logo:dataUrl});
      }catch(err){ alert("Logo konnte nicht verarbeitet werden:\n"+err.message); }
    }
    return <div className="pad">
      <h2 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:22,margin:"4px 2px 14px"}}>Einstellungen</h2>

      {/* Darstellung */}
      <div className="eyebrow" style={{marginTop:0}}>Darstellung</div>
      <div className="card" style={{padding:"4px 14px 8px"}}>
        {settingRow("Dark Mode","Dunkles Design, z.B. fürs Fahren in der Dämmerung",
          <button onClick={()=>setTheme(theme==="dark"?"light":"dark")} aria-label="Dark Mode umschalten"
            style={{width:52,height:30,borderRadius:99,border:"none",position:"relative",cursor:"pointer",
              background:theme==="dark"?"var(--orange)":"#CFC7B8",transition:"background .2s"}}>
            <span style={{position:"absolute",top:3,left:theme==="dark"?25:3,width:24,height:24,borderRadius:"50%",
              background:"#fff",transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
          </button>)}
        {settingRow("Schriftgröße","Größere Schrift für bessere Lesbarkeit",

        <div className="field">

          Dieser Preis gilt pro UE (45 Minuten). Die App rechnet die gefahrenen Minuten in UE um und multipliziert sie mit diesem Preis. Eine 60-Minuten-Fahrstunde sind zum Beispiel 1,33 UE.
        </p>

        <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:8}}>Pakete (Grundgebühr)</label>
        {packages.length===0
          ? <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:10}}>Noch keine Pakete angelegt.</div>

        <div style={{fontSize:14,marginBottom:8}}><b>Preis pro Fahrstunde:</b> {pricePerHour?eurFmt(pricePerHour):"nicht hinterlegt"}</div>
        {packages.length>0&&<div style={{fontSize:13.5,marginBottom:8}}>

      <div className="eyebrow">Schülerliste</div>
      <div className="card" style={{padding:"13px 14px"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:15,marginBottom:9}}>Sortierung</div>
        <div className="seg" style={{marginBottom:0}}>
          {[["name","Name"],["fortschritt","Fortschritt"],["aktivitaet","Aktivität"]].map(([k,l])=>
            <button key={k} className={sortBy===k?"on":""} onClick={()=>setSortBy(k)}>{l}</button>)}

      {/* Ausbildung */}
      <div className="eyebrow">Ausbildung</div>
      <button className="btn btn-ghost btn-block" style={{justifyContent:"space-between",padding:"14px"}}
        onClick={()=>{ setVorlageKind("adk"); setOpenSection(null); setView("vorlage"); }}>
        <span style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          ADK & Strecken bearbeiten
        </span>
        <span style={{color:"var(--muted)"}}>›</span>

      <p style={{fontSize:11.5,color:"var(--muted)",margin:"6px 4px 0",lineHeight:1.5}}>

      {/* Daten */}

        onClick={backupDownload}>
        <span style={{display:"flex",alignItems:"center",gap:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Backup herunterladen
        </span>
        <span style={{color:"var(--muted)"}}>›</span>
      </button>
      <p style={{fontSize:11.5,color:"var(--muted)",margin:"6px 4px 0",lineHeight:1.5}}>
        Speichert alle deine Schülerdaten als Sicherungsdatei auf dein Gerät.
      </p>

      {/* Konto */}
      <div className="eyebrow">Konto</div>
      <div className="card" style={{padding:"13px 14px"}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)"}}>Angemeldet als</div>
        <div style={{fontSize:14.5,fontWeight:600,marginTop:2,marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{session.user.email}</div>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:12}}>
          {myStudents} eigene Schüler{sharedStudents>0?" · "+sharedStudents+" geteilt":""}

        <button className="btn btn-ghost btn-block" onClick={async()=>{
          if(confirm("Wirklich abmelden? Du musst dich danach neu anmelden.")){ await sb.auth.signOut(); }

      {/* Admin (nur für berechtigtes Konto) */}
      {isAdmin(session)&&<div>
        <div className="eyebrow">Administration</div>
        <button className="btn btn-ghost btn-block" style={{justifyContent:"space-between",padding:"14px"}}
          onClick={()=>{ setView("admin"); }}>
          <span style={{display:"flex",alignItems:"center",gap:10}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            Fahrschulen verwalten
          </span>
          <span style={{color:"var(--muted)"}}>›</span>
        </button>
        <p style={{fontSize:11.5,color:"var(--muted)",margin:"6px 4px 0",lineHeight:1.5}}>
          Nur für dich sichtbar. Alle Fahrschulen ansehen, bearbeiten und löschen.
        </p>

      {/* Info */}
      <div className="eyebrow">Info</div>
      <div className="card" style={{padding:"13px 14px",fontSize:12.5,color:"var(--muted)",lineHeight:1.6}}>
        <div><b style={{color:"var(--ink)"}}>{(school&&school.name)||"Fahrschul-App"}</b></div>
        <button onClick={()=>setShowChangelog(true)} style={{display:"inline-flex",alignItems:"center",gap:6,
          color:"var(--orange-deep)",fontWeight:600,fontSize:12.5,padding:0,marginTop:2}}>

  function doPrint(mode){
    setPrintChoice(false);
    document.body.setAttribute("data-print",mode);
    setTimeout(()=>{
      window.print();
      setTimeout(()=>document.body.removeAttribute("data-print"),500);
    },60);
  }

  function backupDownload(){
    try{
      const mine=students.filter(s=>s._isMine).map(s=>cleanData(s));
      const payload={ exportiert:new Date().toISOString(), vorlage:tpl, schueler:mine };
      const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download="fahrschule_v3_backup_"+new Date().toISOString().slice(0,10)+".json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }catch(e){ alert("Backup konnte nicht erstellt werden."); }
  }

  function renderVorlage(){
    const kind = vorlageKind; // "adk" | "strecken"
    const list = kind==="adk" ? tpl.adk : tpl.strecken;
    const isStrecken = kind==="strecken";

    function commit(newList){
      writeTemplate(kind==="adk" ? {...tpl,adk:newList} : {...tpl,strecken:newList});
    }
    function renameSec(idx,title){ const a=deepCopy(list); a[idx].title=title; commit(a); }
    function delSec(idx){
      if(!confirm('Abschnitt "'+list[idx].title+'" mit allen Punkten löschen?')) return;
      const a=deepCopy(list); a.splice(idx,1); commit(a);
    }
    function addSec(){
      const a=deepCopy(list);
      const color=PALETTE[a.length%PALETTE.length];
      a.push({ id:uniqueId(kind), title:isStrecken?"Neue Strecke":"Neuer Abschnitt", color, items:[] });
      commit(a); setOpenSection(a[a.length-1].id);
    }
    function addItem(si){
      const a=deepCopy(list);
      const it={ id:uniqueId("it"), label:"Neuer Punkt", count:1 };
      a[si].items.push(it); commit(a);
    }
    function renameItem(si,ii,label){ const a=deepCopy(list); a[si].items[ii].label=label; commit(a); }
    function setItemCount(si,ii,count){ const a=deepCopy(list); a[si].items[ii].count=Math.max(1,parseInt(count,10)||1); commit(a); }
    function delItem(si,ii){ const a=deepCopy(list); a[si].items.splice(ii,1); commit(a); }

    // Reorder a section from index -> before index "to"
    function reorderSec(from,to){
      if(from===to||to<0||to>list.length) return;
      const a=deepCopy(list); const [m]=a.splice(from,1);
      const idx = to>from ? to-1 : to; a.splice(idx,0,m); commit(a);
    }
    function reorderItem(si,from,to){
      if(from===to||to<0) return;
      const a=deepCopy(list); const items=a[si].items; const [m]=items.splice(from,1);
      const idx = to>from ? to-1 : to; items.splice(idx,0,m); commit(a);
    }

    // ── Pointer-based drag (window-level listeners for reliability) ──
    function startDrag(e,type,si,ii){
      e.preventDefault(); e.stopPropagation();
      dragRef.current={ type, si, ii, overIndex:null };
      setDrag({ type, si, ii, overIndex:null });

      const move=(ev)=>{
        const d=dragRef.current; if(!d) return;
        if(ev.cancelable) ev.preventDefault();
        const pt = ev.touches ? ev.touches[0] : ev;
        if(!pt) return;
        const el=document.elementFromPoint(pt.clientX,pt.clientY);
        if(!el) return;
        let to=null, sel;
        if(d.type==="sec") sel="[data-sec-idx]";
        else sel="[data-item-idx][data-sec='"+d.si+"']";
        const row=el.closest(sel);
        if(row){
          const attr = d.type==="sec" ? "data-sec-idx" : "data-item-idx";
          to=parseInt(row.getAttribute(attr),10);
          const rect=row.getBoundingClientRect();
          const after=pt.clientY>rect.top+rect.height/2;
          to=after?to+1:to;
          dragRef.current={...d,overIndex:to};
          setDrag(s=>s?{...s,overIndex:to}:s);
        }
      };
      const up=()=>{
        window.removeEventListener("pointermove",move);
        window.removeEventListener("pointerup",up);
        window.removeEventListener("touchmove",move);
        window.removeEventListener("touchend",up);
        const d=dragRef.current;
        if(d&&d.overIndex!=null){
          if(d.type==="sec") reorderSec(d.si,d.overIndex);
          else reorderItem(d.si,d.ii,d.overIndex);
        }
        dragRef.current=null; setDrag(null);
      };
      window.addEventListener("pointermove",move,{passive:false});
      window.addEventListener("pointerup",up);
      window.addEventListener("touchmove",move,{passive:false});
      window.addEventListener("touchend",up);
    }

    const Handle = ({onDown}) => (
      <span onPointerDown={onDown} onTouchStart={onDown}
        style={{flexShrink:0,cursor:"grab",touchAction:"none",color:"#B0A896",padding:"6px 8px",
          display:"inline-flex",alignItems:"center",fontSize:18,lineHeight:1,userSelect:"none",WebkitUserSelect:"none"}}
        aria-label="Zum Verschieben ziehen">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" style={{pointerEvents:"none"}}><circle cx="5" cy="3" r="1.5"/><circle cx="11" cy="3" r="1.5"/><circle cx="5" cy="8" r="1.5"/><circle cx="11" cy="8" r="1.5"/><circle cx="5" cy="13" r="1.5"/><circle cx="11" cy="13" r="1.5"/></svg>
      </span>
    );
    const delBtn = (onClick) => (
      <button onClick={onClick} aria-label="Löschen"
        style={{flexShrink:0,width:34,height:34,borderRadius:9,border:"1.5px solid #F0CFC9",background:"#FDECEA",
          color:"#B3362A",fontSize:16,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
      </button>
    );

    const dropLine = <div style={{height:3,background:"var(--orange)",borderRadius:2,margin:"2px 0"}}/>;

    return <div className="pad">
      <div className="card" style={{display:"flex",alignItems:"center",gap:10,padding:"10px 13px",marginBottom:12}}>
        <button className="btn btn-ghost" style={{padding:"8px 12px",fontSize:13}} onClick={()=>setView("liste")}>‹ Zurück</button>
        <div style={{flex:1}}>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:17,lineHeight:1.05}}>Vorlage bearbeiten</div>
          <div style={{fontSize:11,color:"var(--muted)"}}>Gilt für alle deine Schüler</div>
        </div>
      </div>

      <div className="seg">
        {[["adk","ADK"],["strecken","Strecken"]].map(([k,l])=>
          <button key={k} className={vorlageKind===k?"on":""} onClick={()=>{setVorlageKind(k);setOpenSection(null);}}>{l}</button>)}
      </div>

      <div className="card" style={{padding:"10px 13px",marginBottom:12,fontSize:12.5,color:"var(--ink-2)",lineHeight:1.5}}>
        Zum <b>Umbenennen</b> ins Namensfeld tippen. Zum <b>Verschieben</b> am Griff <span style={{color:"#B0A896"}}>⠿</span> ziehen. Mit <b>+</b> Punkte oder Abschnitte hinzufügen, mit dem roten Symbol löschen. Alles wird automatisch gespeichert.
      </div>

      {list.map((sec,si)=>{
        const isOpen=openSection===sec.id;
        const secDragging = drag&&drag.type==="sec"&&drag.si===si;
        return <React.Fragment key={sec.id}>
          {drag&&drag.type==="sec"&&drag.overIndex===si&&dropLine}
          <div data-sec-idx={si} className="card sec"
            style={{borderLeftColor:sec.color||"#999",opacity:secDragging?0.5:1,
              boxShadow:secDragging?"0 6px 18px rgba(0,0,0,.18)":undefined}}>
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"9px 10px"}}>
              <Handle onDown={e=>startDrag(e,"sec",si)}/>
              <button onClick={()=>setOpenSection(isOpen?null:sec.id)} style={{flexShrink:0,color:"var(--muted)",padding:"4px"}}>
                <IcChev open={isOpen}/>
              </button>
              <input value={sec.title} onChange={e=>renameSec(si,e.target.value)}
                style={{flex:1,minWidth:0,border:"1.5px solid transparent",borderRadius:8,padding:"8px 9px",fontSize:15,
                  fontFamily:"var(--font-d)",fontWeight:700,color:sec.color||"var(--ink)",background:"var(--field-bg)"}}
                onFocus={e=>e.target.style.borderColor="var(--line)"}
                onBlur={e=>e.target.style.borderColor="transparent"}/>
              {delBtn(()=>delSec(si))}
            </div>
            {isOpen&&<div style={{padding:"0 10px 10px"}}>
              {sec.items.map((it,ii)=>{
                const itDragging = drag&&drag.type==="item"&&drag.si===si&&drag.ii===ii;
                return <React.Fragment key={it.id}>
                  {drag&&drag.type==="item"&&drag.si===si&&drag.overIndex===ii&&dropLine}
                  <div data-item-idx={ii} data-sec={si}
                    style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderTop:"1px solid #F2EDE3",
                      opacity:itDragging?0.5:1}}>
                    <Handle onDown={e=>startDrag(e,"item",si,ii)}/>
                    <input value={it.label} onChange={e=>renameItem(si,ii,e.target.value)}
                      style={{flex:1,minWidth:0,border:"1.5px solid var(--line)",borderRadius:8,padding:"8px 9px",fontSize:14}}/>
                    <input type="number" min="1" value={it.count||1}
                      onChange={e=>setItemCount(si,ii,e.target.value)}
                      style={{width:48,border:"1.5px solid var(--line)",borderRadius:8,padding:"8px 4px",fontSize:14,textAlign:"center"}}
                      title="Anzahl Durchgänge"/>
                    {delBtn(()=>delItem(si,ii))}
                  </div>
                </React.Fragment>;
              })}
              {drag&&drag.type==="item"&&drag.si===si&&drag.overIndex===sec.items.length&&dropLine}
              <button className="btn btn-ghost btn-block" style={{marginTop:10,padding:"10px",fontSize:13.5}}
                onClick={()=>addItem(si)}>+ Punkt hinzufügen</button>
            </div>}
          </div>
        </React.Fragment>;
      })}
      {drag&&drag.type==="sec"&&drag.overIndex===list.length&&dropLine}

      <button className="btn btn-primary btn-block" style={{marginTop:8}} onClick={addSec}>
        + {isStrecken?"Neue Strecke":"Neuen Abschnitt"} hinzufügen
      </button>

      <button className="btn btn-ghost btn-block" style={{marginTop:10,color:"#B3362A"}}
        onClick={()=>{
          if(confirm("Vorlage auf den Auslieferungszustand zurücksetzen? Deine eingetragenen Schülerdaten bleiben erhalten, aber selbst hinzugefügte Punkte verschwinden.")){
            writeTemplate({adk:deepCopy(DEFAULT_ADK),strecken:deepCopy(DEFAULT_STRECKEN)});
            setOpenSection(null);
          }
        }}>Vorlage zurücksetzen</button>
      <p style={{fontSize:11.5,color:"var(--muted)",textAlign:"center",marginTop:10,lineHeight:1.5}}>
        Vorhandene Schülerfortschritte bleiben an ihren Punkten erhalten. Gelöschte Punkte verlieren ihren Fortschritt.
      </p>
    </div>;
  }

  /* ── Print sheets ── */
  function printSheet(){
    if(!active) return null;
    return <div className="print-sheet">
      <div className="ps-detail">
      <div className="ps-head">
        <img src={logoFor(school)} alt=""/>
        <div>
          <div className="ps-title">Ausbildungsdiagrammkarte – {(school&&school.name)||"Fahrschule V3"}</div>
          <div className="ps-sub">{(school&&school.subtitle)||"Automatik · Klasse B"} · Stand {new Date().toLocaleDateString("de-DE")}</div>
        </div>
      </div>
      <div className="ps-grid">
        <div><b>Name:</b> {active.name||"–"}</div>
        <div><b>Vorname:</b> {active.vorname||"–"}</div>
        <div><b>Geb.:</b> {active.geb?fmtD(active.geb)+"."+new Date(active.geb).getFullYear():"–"}</div>
        <div><b>Tel:</b> {active.tel||"–"}</div>
        <div><b>Anschrift:</b> {active.anschrift||"–"}</div>
        <div><b>Sehhilfe:</b> {active.sehhilfe?"ja":"nein"} · <b>Theorie:</b> {active.theorie?"bestanden":"offen"}</div>
        <div><b>Lenkrad:</b> {active.lenkrad||"–"}</div>
        <div><b>Kopfstütze:</b> {active.kopfstuetze||"–"}</div>
      </div>
      <div className="ps-sec"><h3>ADK – Lerninhalte</h3>
        {tpl.adk.map(sec=><div key={sec.id} style={{marginBottom:5}}>
          <div style={{fontWeight:700,fontSize:11,margin:"3px 0 1px"}}>{sec.title} ({secLern(active,sec)}%)</div>
          {sec.items.map(item=>{
            const cnt=effCount(active,item);
            const done=Math.min(adkDone(active,item),cnt);
            return <div key={item.id} className="ps-row">
              <span className="l">{item.label}</span>
              <span className="r">{done} / {cnt}</span>
            </div>;
          })}
        </div>)}
      </div>
      <div className="ps-sec"><h3>Strecken & Sonderfahrten</h3>
        {tpl.strecken.map(sec=>{
          const note=(active.streckenNotes&&active.streckenNotes[sec.id])||"";
          return <div key={sec.id} style={{marginBottom:5}}>
            <div style={{fontWeight:700,fontSize:11,margin:"3px 0 1px"}}>{sec.title} ({secBack(active,sec)}%)</div>
            {sec.items.map(item=>{
              const done=(active.strecken&&active.strecken[item.id])||0;
              return <div key={item.id} className="ps-row">
                <span className="l">{item.label}</span>
                <span className="r">{done} / {effCount(active,item)}</span>
              </div>;
            })}
            {note&&<div style={{fontSize:10.5,fontStyle:"italic",margin:"2px 0 0",color:"#333"}}>Notiz: {note}</div>}
          </div>;
        })}
      </div>
      {active.lastNote&&<div className="ps-sec"><h3>Letzte Stunde</h3><div style={{fontSize:11}}>{active.lastNote}</div></div>}
      {active.bemerkungen&&<div className="ps-sec"><h3>Bemerkungen</h3><div style={{fontSize:11}}>{active.bemerkungen}</div></div>}
      </div>

      <div className="ps-friendly">
        {friendlySheet()}
      </div>
      <div className="ps-nachweis">
        {nachweisSheet()}
      </div>
    </div>;
  }

  function nachweisSheet(){
    if(!active) return null;
    const std=countStunden(active)+(parseInt(active.manualHours,10)||0);
    const adkPct=calcLern(active.items,tpl.adk,active);
    const strPct=calcBack(active,tpl.strecken);
    const gesamt=Math.max(adkPct,strPct);
    const heute=new Date().toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"});
    const name=((active.vorname||"")+" "+(active.name||"")).trim()||"–";
    // Abgehakte ADK-Abschnitte: nur Abschnitte mit mindestens einem fertig geübten Punkt
    const adkSections=tpl.adk.map(sec=>{
      const done=sec.items.filter(it=>adkDone(active,it)>=effCount(active,it));
      const all=sec.items.length;
      return {...sec, done:done.length, all};
    }).filter(sec=>sec.all>0);
    const streckenSections=tpl.strecken.map(sec=>{
      const done=sec.items.filter(it=>(active.strecken&&active.strecken[it.id]||0)>=effCount(active,it));
      return {...sec, done:done.length, all:sec.items.length};
    }).filter(sec=>sec.all>0);

    return <div style={{fontFamily:"Georgia,serif",color:"#000",fontSize:"10pt",lineHeight:1.5}}>
      {/* Kopfzeile */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"2px solid #000",paddingBottom:10,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <img src={logoFor(school)} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:8}}/>
          <div>
            <div style={{fontSize:"13pt",fontWeight:"bold"}}>{(school&&school.name)||"Fahrschule"}</div>
            <div style={{fontSize:"9pt",color:"#555"}}>{(school&&school.subtitle)||""}</div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"14pt",fontWeight:"bold",letterSpacing:".03em"}}>AUSBILDUNGSNACHWEIS</div>
          <div style={{fontSize:"9pt",color:"#555"}}>Stand: {heute}</div>
        </div>
      </div>

      {/* Schülerdaten */}
      <table style={{width:"100%",borderCollapse:"collapse",marginBottom:14,fontSize:"9.5pt"}}>
        <tbody>
          <tr>
            <td style={{width:"25%",color:"#555",paddingRight:8}}>Name</td>
            <td style={{fontWeight:"bold"}}>{name}</td>
            <td style={{width:"25%",color:"#555",paddingRight:8}}>Geburtsdatum</td>
            <td>{active.geb?new Date(active.geb).toLocaleDateString("de-DE"):"–"}</td>
          </tr>
          <tr>
            <td style={{color:"#555",paddingRight:8}}>Anschrift</td>
            <td>{active.anschrift||"–"}</td>
            <td style={{color:"#555",paddingRight:8}}>Telefon</td>
            <td>{active.tel||"–"}</td>
          </tr>
          <tr>
            <td style={{color:"#555",paddingRight:8}}>Theorieprüfung</td>
            <td>{active.theorie?"Bestanden ✓":"Noch ausstehend"}</td>
            <td style={{color:"#555",paddingRight:8}}>Ausbildungsbeginn</td>
            <td>{active.ausbildungsbeginn?new Date(active.ausbildungsbeginn).toLocaleDateString("de-DE"):"–"}</td>
          </tr>
        </tbody>
      </table>

      {/* Zusammenfassung */}
      <div style={{display:"flex",gap:0,marginBottom:14,border:"1px solid #ccc",borderRadius:6,overflow:"hidden"}}>
        {[["Fahrstunden",std+" Std."],["ADK-Fortschritt",adkPct+"%"],["Strecken",strPct+"%"],["Gesamt",gesamt+"%"]].map(([l,v])=>
          <div key={l} style={{flex:1,padding:"8px 10px",textAlign:"center",borderRight:"1px solid #ccc"}}>
            <div style={{fontSize:"8pt",color:"#777",textTransform:"uppercase",letterSpacing:".05em"}}>{l}</div>
            <div style={{fontSize:"13pt",fontWeight:"bold",marginTop:2}}>{v}</div>
          </div>)}
      </div>

      {/* ADK-Abschnitte */}
      {adkSections.length>0&&<div style={{marginBottom:14}}>
        <div style={{fontWeight:"bold",fontSize:"10pt",borderBottom:"1px solid #ccc",paddingBottom:4,marginBottom:8}}>Ausbildungsdiagrammkarte (ADK)</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:"9pt"}}>
          <thead>
            <tr style={{background:"#f5f5f5"}}>
              <th style={{textAlign:"left",padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Abschnitt</th>
              <th style={{textAlign:"center",width:60,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Fertig</th>
              <th style={{textAlign:"center",width:60,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Gesamt</th>
              <th style={{textAlign:"center",width:70,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Status</th>
            </tr>
          </thead>
          <tbody>
            {adkSections.map(sec=>
              <tr key={sec.id} style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"4px 6px"}}>{sec.title}</td>
                <td style={{textAlign:"center",padding:"4px 6px"}}>{sec.done}</td>
                <td style={{textAlign:"center",padding:"4px 6px"}}>{sec.all}</td>
                <td style={{textAlign:"center",padding:"4px 6px",color:sec.done===sec.all?"#12A150":"#888"}}>
                  {sec.done===sec.all?"✓ Fertig":sec.done+"/"+sec.all}
                </td>
              </tr>)}
          </tbody>
        </table>
      </div>}

      {/* Strecken */}
      {streckenSections.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontWeight:"bold",fontSize:"10pt",borderBottom:"1px solid #ccc",paddingBottom:4,marginBottom:8}}>Strecken</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:"9pt"}}>
          <thead>
            <tr style={{background:"#f5f5f5"}}>
              <th style={{textAlign:"left",padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Abschnitt</th>
              <th style={{textAlign:"center",width:60,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Fertig</th>
              <th style={{textAlign:"center",width:60,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Gesamt</th>
              <th style={{textAlign:"center",width:70,padding:"4px 6px",borderBottom:"1px solid #ccc"}}>Status</th>
            </tr>
          </thead>
          <tbody>
            {streckenSections.map(sec=>
              <tr key={sec.id} style={{borderBottom:"1px solid #eee"}}>
                <td style={{padding:"4px 6px"}}>{sec.title}</td>
                <td style={{textAlign:"center",padding:"4px 6px"}}>{sec.done}</td>
                <td style={{textAlign:"center",padding:"4px 6px"}}>{sec.all}</td>
                <td style={{textAlign:"center",padding:"4px 6px",color:sec.done===sec.all?"#12A150":"#888"}}>
                  {sec.done===sec.all?"✓ Fertig":sec.done+"/"+sec.all}
                </td>
              </tr>)}
          </tbody>
        </table>
      </div>}

      {/* Unterschriften */}
      <div style={{marginTop:24,paddingTop:14,borderTop:"1px solid #ccc"}}>
        <div style={{display:"flex",gap:40}}>
          <div style={{flex:1}}>
            {instrSig&&<img src={instrSig} alt="Unterschrift Fahrlehrer" style={{height:52,maxWidth:"100%",objectFit:"contain",display:"block",marginBottom:4}}/>}
            <div style={{borderTop:"1px solid #000",marginTop:instrSig?0:32,paddingTop:6,fontSize:"9pt",color:"#555"}}>
              Datum, Unterschrift Fahrlehrer
            </div>
          </div>
          <div style={{flex:1}}>
            {stuSig&&<img src={stuSig} alt="Unterschrift Fahrschüler" style={{height:52,maxWidth:"100%",objectFit:"contain",display:"block",marginBottom:4}}/>}
            <div style={{borderTop:"1px solid #000",marginTop:stuSig?0:32,paddingTop:6,fontSize:"9pt",color:"#555"}}>
              Datum, Unterschrift Fahrschüler
            </div>
          </div>
        </div>
        <div style={{marginTop:14,fontSize:"8pt",color:"#999",textAlign:"center"}}>
          Dieses Dokument wurde von {(school&&school.name)||"der Fahrschule"} erstellt · {heute}
        </div>
      </div>
    </div>;
  }

  function friendlySheet(){
    const adkPct=calcLern(active.items,tpl.adk,active);
    const strPct=calcBack(active,tpl.strecken);
    const gesamt = Math.max(adkPct,strPct);
    const std=countStunden(active)+(parseInt(active.manualHours,10)||0);
    const r=pruefungsreife(active,tpl.adk,tpl.strecken);
    const ready=r.total===0;
    return <div>
      <div className="ps-head">
        <img src={logoFor(school)} alt=""/>
        <div>
          <div className="ps-title">Mein Ausbildungsstand</div>
          <div className="ps-sub">{((active.vorname||"")+" "+(active.name||"")).trim()||"Fahrschüler"} · {(school&&school.name)||"Fahrschule V3"} · {new Date().toLocaleDateString("de-DE")}</div>
        </div>
      </div>

      <div className="pf-hero">
        <div className="big">{gesamt}%</div>
        <div className="lbl">Gesamtfortschritt</div>
      </div>

      <div className="pf-stats">
        <div className="pf-stat"><b>{adkPct}%</b><span>Lerninhalte</span></div>
        <div className="pf-stat"><b>{strPct}%</b><span>Strecken</span></div>
        <div className="pf-stat"><b>{std}</b><span>Fahrstunden</span></div>
        <div className="pf-stat"><b>{active.theorie?"✓":"–"}</b><span>Theorie</span></div>
      </div>

      <div className="ps-sec"><h3>Lerninhalte (ADK)</h3>
        {tpl.adk.map(sec=>{
          const p=secLern(active,sec);
          return <div key={sec.id} className="pf-bar-row">
            <span className="name">{sec.title}</span>
            <span className="pf-bar"><i style={{width:p+"%"}}/></span>
            <span className="pct">{p}%</span>
          </div>;
        })}
      </div>

      <div className="ps-sec"><h3>Strecken & Sonderfahrten</h3>
        {tpl.strecken.map(sec=>{
          const p=secBack(active,sec);
          return <div key={sec.id} className="pf-bar-row">
            <span className="name">{sec.title}</span>
            <span className="pf-bar"><i style={{width:p+"%"}}/></span>
            <span className="pct">{p}%</span>
          </div>;
        })}
      </div>

      {ready
        ? <div className="pf-ready">✓ Du hast alles geschafft und bist bereit für die Prüfung!</div>
        : <div className="pf-missing">
            <h3>Das fehlt noch bis zur Prüfung ({r.total})</h3>
            {r.theorieOffen&&<div style={{fontSize:12,fontWeight:700,marginBottom:6}}>• Theorieprüfung bestehen</div>}
            {r.offeneADK.length>0&&<div style={{marginBottom:6}}>
              <div style={{fontSize:11.5,fontWeight:700,marginBottom:2}}>Lerninhalte ({r.offeneADK.length}):</div>
              <ul>{r.offeneADK.slice(0,40).map((o,i)=><li key={i}>{o.label} <span style={{color:"#555"}}>({o.done}/{o.soll})</span></li>)}</ul>
            </div>}
            {r.offeneStrecken.length>0&&<div>
              <div style={{fontSize:11.5,fontWeight:700,marginBottom:2}}>Strecken ({r.offeneStrecken.length}):</div>
              <ul>{r.offeneStrecken.slice(0,40).map((o,i)=><li key={i}>{o.label} <span style={{color:"#555"}}>({o.done}/{o.soll})</span></li>)}</ul>
            </div>}
          </div>}
    </div>;
  }

  // Gruppierte Reiter
  const ausbildungViews=["adk","strecken","tagebuch"];
  const mehrViews=["daten","einstellungen"];
  const ausbildungActive=ausbildungViews.indexOf(view)>=0;
  const mehrActive=mehrViews.indexOf(view)>=0;
  const pendingCount=(appts||[]).filter(a=>a.status==="pending").length;

  return <div>
    <div className="app">
      <div className="shell" style={fontScale!==1?{zoom:fontScale}:null}>
        <header className="topbar">
          <div className="topbar-row">
            <div className="brand">
              <img src={logoFor(school)} alt="Logo"/>
              <div>
                <div className="brand-name">{(school&&school.name)||"Fahrschule V3"}</div>
                <div className="brand-sub">{(school&&school.subtitle)||"Automatik · Klasse B"}</div>
              </div>
            </div>
            <div className="save-pill">{saved?"✓ Gespeichert":"Speichert…"}</div>
          </div>
        </header>
        {pendingCount>0&&view!=="kalender"&&<div style={{padding:"0 16px",marginTop:12}}>
          <button onClick={()=>setView("kalender")} style={{width:"100%",display:"flex",alignItems:"center",gap:11,
            background:"var(--amber-bg)",border:"1.5px solid var(--amber)",borderRadius:13,padding:"12px 14px",textAlign:"left"}}>
            <span style={{width:34,height:34,borderRadius:9,background:"#E5484D",color:"#fff",display:"inline-flex",
              alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:17}}>
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </span>
            <span style={{flex:1,minWidth:0}}>
              <span style={{display:"block",fontFamily:"var(--font-d)",fontWeight:800,fontSize:14.5,color:"#8A5A00"}}>
                {pendingCount===1?"Neuer Terminvorschlag":pendingCount+" neue Terminvorschläge"}
              </span>
              <span style={{display:"block",fontSize:12.5,color:"var(--ink-2)"}}>Im Kalender ansehen und bestätigen</span>
            </span>
            <span style={{color:"var(--muted)",fontSize:18}}>›</span>
          </button>
        </div>}
        {view==="liste"&&renderListe()}
        {view==="vorlage"&&renderVorlage()}
        {view==="einstellungen"&&renderEinstellungen()}
        {view==="kalender"&&renderKalender()}
        {view==="admin"&&isAdmin(session)&&renderAdmin()}
        {view!=="liste"&&view!=="vorlage"&&view!=="einstellungen"&&view!=="kalender"&&view!=="admin"&&!active&&<div className="pad"><div className="card" style={{padding:"22px 16px",textAlign:"center"}}>
          <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:16,marginBottom:10}}>Kein Schüler ausgewählt</div>
          <button className="btn btn-primary" onClick={()=>setView("liste")}>Zur Schülerliste</button>
        </div></div>}
        {view==="adk"&&active&&renderADK()}
        {view==="strecken"&&active&&renderStrecken()}
        {view==="tagebuch"&&active&&renderTagebuch()}
        {view==="uebersicht"&&active&&renderUebersicht()}
        {view==="daten"&&active&&renderDaten()}

        {tabMenu&&<div onClick={()=>setTabMenu(null)} style={{position:"fixed",inset:0,zIndex:46}}/>}

        {/* Schwebender KI-Helfer-Knopf */}
        <button onClick={()=>setAssistant({open:true,busy:false,error:"",input:"",proposal:null})}
          aria-label="KI-Helfer"
          style={{position:"fixed",right:16,bottom:"calc(76px + env(safe-area-inset-bottom))",zIndex:47,
            width:54,height:54,borderRadius:"50%",border:"none",background:"var(--orange)",color:"#fff",
            boxShadow:"0 6px 18px rgba(0,0,0,.28)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 8V4H8"/><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
        </button>

        <nav className="tabbar">
          <button className={"tab"+(view==="liste"?" on":"")} onClick={()=>{setView("liste");setTabMenu(null);}}>
            <IcUsers/><span>Schüler</span>
          </button>

          <div style={{flex:1,position:"relative"}}>
            {tabMenu==="ausbildung"&&<div className="tabpop">
              {[["adk","ADK",<IcCard/>],["strecken","Strecken",<IcMap/>],["tagebuch","Fahrstunden",<IcBook/>]].map(([id,lbl,ic])=>
                <button key={id} className={"tabpop-item"+(view===id?" on":"")} onClick={()=>{setView(id);setTabMenu(null);}}>
                  <span className="tabpop-ic">{ic}</span>{lbl}
                </button>)}
            </div>}
            <button className={"tab"+(ausbildungActive?" on":"")} style={{width:"100%"}}
              onClick={()=>setTabMenu(tabMenu==="ausbildung"?null:"ausbildung")}>
              <IcCard/><span>Ausbildung</span>
            </button>
          </div>

          <button className={"tab"+(view==="uebersicht"?" on":"")} onClick={()=>{setView("uebersicht");setTabMenu(null);}}>
            <IcChart/><span>Übersicht</span>
          </button>

          <button className={"tab"+(view==="kalender"?" on":"")} onClick={()=>{setView("kalender");setTabMenu(null);}} style={{position:"relative"}}>
            <IcCalendar/><span>Kalender</span>
            {pendingCount>0&&<span style={{position:"absolute",top:2,right:"calc(50% - 22px)",minWidth:17,height:17,
              padding:"0 4px",borderRadius:9,background:"#E5484D",color:"#fff",fontSize:10.5,fontWeight:800,
              lineHeight:"17px",textAlign:"center",fontFamily:"var(--font-d)",boxShadow:"0 1px 4px rgba(0,0,0,.3)"}}>{pendingCount}</span>}
          </button>

          <div style={{flex:1,position:"relative"}}>
            {tabMenu==="mehr"&&<div className="tabpop right">
              {[["daten","Schülerdaten",<IcGear/>],["einstellungen","Einstellungen",<IcSettings/>]].map(([id,lbl,ic])=>
                <button key={id} className={"tabpop-item"+(view===id?" on":"")} onClick={()=>{setView(id);setTabMenu(null);}}>

        <div className="field" style={{marginBottom:16}}>
          <label>Notiz (optional)</label>
          <input type="text" value={apptForm.note} onChange={e=>setApptForm({...apptForm,note:e.target.value})} placeholder="z.B. Autobahnfahrt, Treffpunkt…"/>
        </div>
        <button className="btn btn-primary btn-block" style={{marginBottom:10}} onClick={saveApptForm}>
          {apptForm.id?"Speichern":"Termin anlegen"}
        </button>
        {apptForm.id&&apptForm.student_id&&apptForm.start_at&&new Date(apptForm.start_at)<new Date()&&
          <button className="btn btn-ghost btn-block" style={{marginBottom:10,gap:8,color:"var(--blue)"}}
            onClick={()=>{ const a={id:apptForm.id,student_id:apptForm.student_id,start_at:apptForm.start_at}; setApptForm(null); rateLessonFromAppt(a); }}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 7v14"/><path d="M3 18a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h5a4 4 0 0 1 4 4 4 4 0 0 1 4-4h5a1 1 0 0 1 1 1v13a1 1 0 0 1-1 1h-6a3 3 0 0 0-3 3 3 3 0 0 0-3-3z"/></svg>
            Stunde im Tagebuch bewerten
          </button>}
        {apptForm.id&&<button className="btn btn-ghost btn-block" style={{marginBottom:10,gap:8,color:"var(--blue)"}}
          onClick={()=>{
            const a=(appts||[]).find(x=>x.id===apptForm.id);
            const appt=a||{id:apptForm.id,title:apptForm.title,start_at:apptForm.start_at,end_at:apptForm.end_at,note:apptForm.note,student_id:apptForm.student_id};
            const stu=apptForm.student_id?students.find(s=>s.id===apptForm.student_id):null;
            shareICS([appt],stu);
          }}>
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Als Kalender-Datei senden
        </button>}
        {apptForm.id&&<button className="btn btn-ghost btn-block" style={{marginBottom:10,color:"#B3362A"}}
          onClick={()=>{ if(confirm("Diesen Termin löschen?")){ removeAppt(apptForm.id); setApptForm(null); } }}>Termin löschen</button>}
        <button className="btn btn-ghost btn-block" onClick={()=>setApptForm(null)}>Abbrechen</button>
      </div>
    </div>}
    {showNachweisModal&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",
      alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:"var(--card)",width:"100%",maxWidth:560,borderTopLeftRadius:20,borderTopRightRadius:20,
        padding:"20px 18px calc(20px + env(safe-area-inset-bottom))",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:"var(--line)",borderRadius:99,margin:"0 auto 16px"}}/>
        <h3 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:19,marginBottom:4}}>Unterschriften</h3>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:16,lineHeight:1.5}}>
          Unterschreibe zuerst selbst, dann gib dem Schüler das Handy zum Unterschreiben.
        </p>
        <SignaturePad
          label="Fahrlehrer (du)"
          existing={instrSig}
          onSave={url=>{ setInstrSig(url); try{ localStorage.setItem("v3_instr_sig",url); }catch(e){} }}
          onClear={()=>{ setInstrSig(null); try{ localStorage.removeItem("v3_instr_sig"); }catch(e){} }}/>
        <SignaturePad
          label={"Fahrschüler · "+(active?dispName(active):"–")}
          existing={stuSig}
          onSave={url=>setStuSig(url)}
          onClear={()=>setStuSig(null)}/>
        <button className="btn btn-primary btn-block" style={{marginBottom:10}} onClick={()=>{ setShowNachweisModal(false); doPrint("nachweis"); }}>
          PDF erstellen
        </button>
        <button className="btn btn-ghost btn-block" onClick={()=>setShowNachweisModal(false)}>Abbrechen</button>
      </div>
    </div>}
    {printChoice&&<div onClick={()=>setPrintChoice(false)}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",
        alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",width:"100%",maxWidth:560,
        borderTopLeftRadius:20,borderTopRightRadius:20,padding:"20px 18px calc(24px + env(safe-area-inset-bottom))"}}>
        <div style={{width:40,height:4,background:"var(--line)",borderRadius:99,margin:"0 auto 16px"}}/>
        <h3 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:19,marginBottom:4}}>Welche PDF-Ansicht?</h3>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>Wähle, welche Version du erstellen möchtest.</p>
        <button className="btn btn-primary btn-block" style={{marginBottom:10,flexDirection:"column",alignItems:"flex-start",padding:"13px 16px"}}
          onClick={()=>doPrint("friendly")}>
          <span style={{fontSize:15}}>Für den Schüler</span>
          <span style={{fontSize:11.5,fontWeight:500,opacity:0.85,marginTop:2}}>Übersichtlich mit Prozentzahlen und was noch fehlt</span>
        </button>
        <button className="btn btn-ghost btn-block" style={{marginBottom:10,flexDirection:"column",alignItems:"flex-start",padding:"13px 16px"}}
          onClick={()=>doPrint("detail")}>
          <span style={{fontSize:15}}>Detailliert</span>
          <span style={{fontSize:11.5,fontWeight:500,color:"var(--muted)",marginTop:2}}>Alle Punkte einzeln, für deine Unterlagen</span>
        </button>
        <button className="btn btn-ghost btn-block" style={{marginBottom:14,flexDirection:"column",alignItems:"flex-start",padding:"13px 16px"}}
          onClick={()=>{ setPrintChoice(false); setStuSig(null); setShowNachweisModal(true); }}>
          <span style={{fontSize:15}}>Ausbildungsnachweis</span>
          <span style={{fontSize:11.5,fontWeight:500,color:"var(--muted)",marginTop:2}}>Formales Dokument mit Unterschriftenzeile</span>
        </button>
        <button className="btn btn-ghost btn-block" onClick={()=>setPrintChoice(false)}>Abbrechen</button>
      </div>
    </div>}
    {printSheet()}
  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ console.error("Render-Fehler:",err,info); }
  render(){
    if(this.state.err){
      return <div style={{padding:24,fontFamily:"system-ui,sans-serif",background:"#FDECEA",minHeight:"100vh"}}>
        <h2 style={{color:"#B3362A",marginBottom:10}}>App-Fehler</h2>
        <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-word",fontSize:13,color:"#7a241c",background:"#fff",padding:12,borderRadius:8,border:"1px solid #f0c4be"}}>
{String(this.state.err&&this.state.err.stack?this.state.err.stack:this.state.err)}
        </pre>
        <button onClick={()=>{ try{ for(const k in localStorage){ if(k.indexOf("v3_cache_")===0) localStorage.removeItem(k); } }catch(e){} location.reload(); }}
          style={{marginTop:14,background:"#181512",color:"#FF9300",border:"none",borderRadius:10,padding:"12px 18px",fontWeight:700,fontSize:15}}>
          Zwischenspeicher leeren & neu laden
        </button>
      </div>;
    }
    return this.props.children;
  }
}

window.addEventListener("error",function(e){
  var r=document.getElementById("root");
  if(r&&r.children.length===0){
    r.innerHTML='<div style="padding:24px;font-family:system-ui;background:#FDECEA;min-height:100vh"><h2 style="color:#B3362A">Start-Fehler</h2><pre style="white-space:pre-wrap;word-break:break-word;font-size:13px;color:#7a241c;background:#fff;padding:12px;border-radius:8px">'+(e.message||e.error||"Unbekannt")+'</pre></div>';
  }
});
