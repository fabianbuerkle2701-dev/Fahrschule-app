function getBookingCodeFromURL(){
  try{
    const u=new URL(window.location.href);
    const q=u.searchParams.get("buchen");
    if(q) return q;
    const h=u.hash||"";
    const m=h.match(/buchen[\/=]([A-Za-z0-9]+)/);
    if(m) return m[1];
  }catch(e){}
  return null;
}

function BookingPage({code}){
  const [info,setInfo]=React.useState(undefined); // undefined=lädt, null=ungültig
  const [week,setWeek]=React.useState(()=>startOfWeek(new Date()));
  const [busy,setBusy]=React.useState([]);
  const [loadingBusy,setLoadingBusy]=React.useState(false);
  const [mineSlots,setMineSlots]=React.useState(()=>{ try{ return JSON.parse(localStorage.getItem("v3_mine_"+code)||"[]"); }catch(e){ return []; } });
  // Name des Fahrschülers (bleibt auf dem Gerät gespeichert), um eigene Termine geräteübergreifend wiederzuerkennen
  const [myName,setMyName]=React.useState(()=>{ try{ return localStorage.getItem("v3_myname_"+code)||""; }catch(e){ return ""; } });
  const [nameSlots,setNameSlots]=React.useState([]); // Startzeiten der eigenen Termine, per Name vom Server geholt
  const [form,setForm]=React.useState(null); // {date,start,end,name,note}
  const [done,setDone]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [err,setErr]=React.useState("");

  React.useEffect(()=>{
    publicBookingInfo(code).then(d=>{
      setInfo(d);
      if(d&&d.color) applySchoolColor(d.color);
    }).catch(()=>setInfo(null));
  },[code]);

  React.useEffect(()=>{
    if(!info) return;
    setLoadingBusy(true);
    const von=startOfWeek(week).toISOString();
    const bis=addDays(startOfWeek(week),7).toISOString();
    publicBusyTimes(code,von,bis).then(rows=>{ setBusy(rows||[]); setLoadingBusy(false); })
      .catch(()=>{ setBusy([]); setLoadingBusy(false); });
  },[info,week,code,done]);

  // Eigene Termine per Name laden (geräteübergreifende Wiedererkennung)
  React.useEffect(()=>{
    if(!info||!myName.trim()){ setNameSlots([]); return; }
    const von=startOfWeek(week).toISOString();
    const bis=addDays(startOfWeek(week),7).toISOString();
    publicMySlots(code,myName.trim(),von,bis)
      .then(rows=>setNameSlots((rows||[]).map(r=>r.start_at)))
      .catch(()=>setNameSlots([]));
  },[info,week,code,myName,done]);

  if(info===undefined) return <Splash text="Lädt…"/>;
  if(info===null) return <div style={{minHeight:"100vh",background:"var(--paper)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div className="card" style={{padding:"26px 20px",textAlign:"center",maxWidth:380}}>
      <div style={{fontSize:40,marginBottom:8}}>🤔</div>
      <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:18,marginBottom:6}}>Link ungültig</div>
      <div style={{fontSize:14,color:"var(--muted)"}}>Dieser Buchungslink ist nicht gültig. Bitte frag deinen Fahrlehrer nach einem aktuellen Link.</div>
    </div>
  </div>;

  const allDays=[0,1,2,3,4,5,6].map(i=>addDays(startOfWeek(week),i));
  const todayKey=ymd(new Date());
  const days=allDays.filter(d=>ymd(d)>=todayKey); // nur heute und Zukunft
  const weekEnd=addDays(startOfWeek(week),6);
  // Zurückblättern nur erlaubt, solange man nicht schon in der aktuellen Woche ist
  const canGoBack=ymd(startOfWeek(week))>ymd(startOfWeek(new Date()));
  const byDay={};
  busy.forEach(b=>{ const k=ymd(b.start_at); (byDay[k]=byDay[k]||[]).push(b); });
  // Menge der eigenen Startzeiten (auf Minute genau), zur Hervorhebung.
  // Kombiniert lokal gespeicherte Termine (dieses Gerät) mit per Name gefundenen (geräteübergreifend).
  const mineSet=new Set([...(mineSlots||[]),...(nameSlots||[])].map(x=>new Date(x).getTime()));
  const isMine=(b)=>mineSet.has(new Date(b.start_at).getTime());

  function openForm(dateStr){
    // Namen aus dem gespeicherten myName vorbelegen (erste Wort = Vorname, Rest = Nachname)
    const parts=(myName||"").trim().split(/\s+/);
    const vn=parts.length?parts[0]:"";
    const nn=parts.length>1?parts.slice(1).join(" "):"";
    setForm({ vorname:vn, nachname:nn, note:"",
      slots:[{ date:dateStr||ymd(new Date()), start:"09:00", end:"10:00" }] });
    setErr("");
  }
  function addSlot(){
    setForm(f=>({...f, slots:[...f.slots, { date:f.slots[f.slots.length-1]?.date||ymd(new Date()), start:"09:00", end:"10:00" }]}));
  }
  function removeSlot(i){
    setForm(f=>({...f, slots:f.slots.filter((_,idx)=>idx!==i)}));
  }
  const DOW_KEYS=["so","mo","di","mi","do","fr","sa"]; // Date.getDay(): 0=So..6=Sa
  function updateSlot(i,patch){
    // Wählt jemand einen gesperrten Tag (Sonntag fest, oder vom Fahrlehrer explizit gesperrt),
    // automatisch auf den nächsten wirklich buchbaren Tag springen, statt erst beim Absenden
    // eine Fehlermeldung zu zeigen.
    if(patch.date){
      let d=new Date(patch.date+"T00:00:00");
      const wh=info&&info.work_hours;
      const isBlocked=(dt)=>{
        const key=DOW_KEYS[dt.getDay()];
        if(key==="so") return true;
        const day=wh&&typeof wh==="object"?wh[key]:null;
        return !!(day&&day.blocked);
      };
      if(isBlocked(d)){
        let jumped=false;
        for(let i2=0;i2<8;i2++){ // maximal eine Woche weitersuchen, niemals endlos
          d=new Date(d.getTime()+86400000);
          if(!isBlocked(d)){ jumped=true; break; }
        }
        if(jumped){
          patch={...patch, date:ymd(d)};
          setErr("An diesem Tag werden keine Termine angeboten, auf den nächsten freien Tag gesprungen.");
        }
      }
    }
    setForm(f=>({...f, slots:f.slots.map((s,idx)=>idx===i?{...s,...patch}:s)}));
  }
  // Prüft, ob ein Termin (Datum + Start/Ende) buchbar ist.
  // Kein Eintrag für den Tag, oder Eintrag ohne Zeiten und ohne Sperrung = ganztägig buchbar.
  // day.blocked = Tag komplett gesperrt, unabhängig von Zeiten.
  // day.von/day.bis gesetzt = nur innerhalb dieses Zeitfensters buchbar.
  // Sonntag ist grundsätzlich gesperrt, unabhängig von gespeicherten Daten (kein Arbeitstag).
  function withinWorkHours(dateStr,start,end){
    const key=DOW_KEYS[new Date(dateStr+"T00:00:00").getDay()];
    if(key==="so") return false;
    const wh=info&&info.work_hours;
    if(!wh||typeof wh!=="object") return true;
    const day=wh[key];
    if(!day) return true; // kein Eintrag für diesen Tag = ganztägig buchbar
    if(day.blocked) return false; // Tag explizit komplett gesperrt
    if(!day.von||!day.bis) return true; // keine Zeit eingetragen = ganztägig buchbar
    return start>=day.von && end<=day.bis; // Zeit eingetragen = nur innerhalb erlaubt
  }
  async function send(){
    if(!form.vorname.trim()||!form.nachname.trim()){ setErr("Bitte Vor- und Nachname angeben."); return; }
    if(!form.slots.length){ setErr("Bitte mindestens einen Termin angeben."); return; }
    for(const s of form.slots){
      if(!s.date||!s.start){ setErr("Bitte bei jedem Termin Datum und Uhrzeit angeben."); return; }
      if(ymd(s.date)<ymd(new Date())){ setErr("Bitte bei jedem Termin einen Tag ab heute wählen."); return; }
      if(!withinWorkHours(s.date,s.start,s.end)){
        setErr("Der Termin am "+dayMonth(new Date(s.date+"T00:00:00"))+" um "+s.start+" liegt außerhalb der Arbeitszeit deines Fahrlehrers. Bitte eine andere Zeit wählen.");
        return;
      }
    }
    setSending(true); setErr("");
    const fullName=(form.vorname.trim()+" "+form.nachname.trim()).trim();
    const results=[]; // sammelt Erfolg/Fehler je Termin
    const newMine=[]; // erfolgreich vorgeschlagene eigene Termine (Startzeit)
    for(const s of form.slots){
      try{
        const startISO=combineDT(s.date,s.start);
        await publicProposeAppointment(code, startISO,
          s.end?combineDT(s.date,s.end):null, fullName, form.note||"");
        results.push({ok:true, s});
        newMine.push(startISO);
      }catch(e){
        const msg=String(e&&e.message||"");
        let reason="Konnte nicht gesendet werden";
        if(/OVERLAP/i.test(msg)) reason="schon belegt oder angefragt";
        else if(/NOPAST/i.test(msg)) reason="liegt in der Vergangenheit";
        results.push({ok:false, s, reason});
      }
    }
    // Eigene Termine im Browser merken (dieses Gerät) und Namen für geräteübergreifende Wiedererkennung speichern
    if(newMine.length){
      try{
        const merged=Array.from(new Set([...(mineSlots||[]), ...newMine]));
        localStorage.setItem("v3_mine_"+code, JSON.stringify(merged));
        setMineSlots(merged);
      }catch(e){ /* Speicher nicht verfügbar, dann eben ohne Hervorhebung */ }
      try{
        localStorage.setItem("v3_myname_"+code, fullName);
        setMyName(fullName);
      }catch(e){}
    }
    setSending(false);
    const ok=results.filter(r=>r.ok).length;
    const fail=results.filter(r=>!r.ok);
    // belegte Zeiten neu laden
    const von=startOfWeek(week).toISOString();
    const bis=addDays(startOfWeek(week),7).toISOString();
    publicBusyTimes(code,von,bis).then(rows=>setBusy(rows||[])).catch(()=>{});
    if(fail.length===0){
      setForm(null); setDone(true);
      setTimeout(()=>setDone(false),4000);
    }else if(ok>0){
      // Einige gingen, einige nicht: nur die fehlgeschlagenen im Formular lassen
      setForm(f=>({...f, slots:fail.map(r=>r.s)}));
      setErr(ok+" Termin"+(ok===1?"":"e")+" gesendet. "+fail.length+" Zeit"+(fail.length===1?"":"en")+" war"+(fail.length===1?"":"en")+" "+fail[0].reason+". Bitte ändern.");
    }else{
      setErr("Diese Zeiten sind "+fail[0].reason+". Bitte andere Uhrzeiten wählen.");
    }
  }

  return <div style={{minHeight:"100vh",background:"var(--paper)"}}>
    <header className="topbar">
      <div className="topbar-row">
        <div className="brand">
          <img src={(info&&info.logo)?info.logo:DEFAULT_LOGO} alt="Logo"/>
          <div>
            <div className="brand-name">{info.school_name||"Fahrschule"}</div>
            <div className="brand-sub">Termin anfragen</div>
          </div>
        </div>
      </div>
    </header>

    <div className="pad">
      {done&&<div className="card" style={{padding:"16px",marginBottom:14,background:"var(--green-bg)",border:"1.5px solid var(--green)"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:16,color:"var(--green)"}}>✓ Vielen Dank!</div>
        <div style={{fontSize:13.5,color:"var(--ink-2)",marginTop:4,lineHeight:1.5}}>Deine Anfrage ist eingegangen. Dein Fahrlehrer prüft den Termin und bestätigt ihn. Du bekommst dann Bescheid.</div>
      </div>}

      <div className="card" style={{padding:"14px 16px",marginBottom:14,background:"var(--orange-soft)",border:"1.5px solid var(--orange)"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:14.5,marginBottom:6,color:"var(--orange-deep)"}}>So funktioniert es</div>
        <div style={{fontSize:13.5,lineHeight:1.6,color:"var(--ink-2)"}}>
          1. Tippe auf „+ Termin" und wähle einen freien Tag und eine Uhrzeit.<br/>
          2. Du kannst auch mehrere Wunschtermine auf einmal vorschlagen.<br/>
          3. Dein Fahrlehrer prüft und bestätigt die Termine. Belegte Zeiten siehst du als „belegt".<br/>
          4. Deine eigenen Termine sind farbig hervorgehoben und zeigen dir, ob sie noch offen oder schon bestätigt sind.<br/>
          5. Bei jedem Tag siehst du, wie viel schon belegt ist. Ist ein Tag voll, kannst du dort keinen Termin mehr anfragen.
        </div>
      </div>

      <div className="card" style={{padding:"13px 15px",marginBottom:14}}>
        <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,letterSpacing:".06em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:7}}>Dein Name</label>
        <input type="text" defaultValue={myName} placeholder="z.B. Anna Müller"
          onBlur={e=>{
            const v=e.target.value.trim();
            setMyName(v);
            try{ if(v) localStorage.setItem("v3_myname_"+code,v); else localStorage.removeItem("v3_myname_"+code); }catch(err){}
          }}
          style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"11px 13px",fontSize:16}}/>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:7,lineHeight:1.45}}>
          Gib deinen Namen ein, dann werden deine eigenen Termine farbig hervorgehoben, auch wenn du den Link später erneut oder auf einem anderen Gerät öffnest. Schreib ihn genau so wie beim Vorschlagen.
        </div>
      </div>

      {(mineSet.size>0)&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"9px 12px",borderRadius:10,background:"var(--orange-soft)",border:"1px solid var(--orange)"}}>
        <div style={{width:14,height:14,borderRadius:4,background:"var(--orange)",flexShrink:0}}/>
        <div style={{fontSize:12.5,color:"var(--ink-2)",lineHeight:1.45}}>Farbig hervorgehoben sind deine eigenen Termine.</div>
      </div>}

      <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>openForm()}>+ Termin vorschlagen</button>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <button className="btn btn-ghost" style={{padding:"8px 12px",opacity:canGoBack?1:0.35}} disabled={!canGoBack}
          onClick={()=>{ if(canGoBack) setWeek(addDays(startOfWeek(week),-7)); }}>‹</button>
        <div style={{flex:1,textAlign:"center",fontSize:13,fontWeight:700,fontFamily:"var(--font-d)"}}>
          {dayMonth(startOfWeek(week))} – {dayMonth(weekEnd)}.
        </div>
        <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setWeek(addDays(startOfWeek(week),7))}>›</button>
      </div>

      {loadingBusy&&<div style={{textAlign:"center",fontSize:13,color:"var(--muted)",padding:"8px"}}>Lädt…</div>}

      {days.map(d=>{
        const k=ymd(d);
        const list=(byDay[k]||[]).sort((a,b)=>a.start_at.localeCompare(b.start_at));
        const today=isToday(d);
        // Öffnungszeiten-Info für diesen Tag ermitteln (aus den Arbeitszeiten des Fahrlehrers)
        const dowKey=DOW_KEYS[d.getDay()];
        const dayHours=(info&&info.work_hours&&typeof info.work_hours==="object")?info.work_hours[dowKey]:null;
        const dayBlocked=dowKey==="so"||!!(dayHours&&dayHours.blocked);
        const hoursLabel=dayBlocked?null:((dayHours&&dayHours.von&&dayHours.bis)?dayHours.von+" – "+dayHours.bis+" Uhr":"ganztägig geöffnet");
        // Belegte Minuten an diesem Tag (bestätigte Termine), für die Limit-Anzeige
        const dayLim=(info&&info.day_limit)||0;
        const usedMin=(byDay[k]||[]).filter(b=>b.status!=="pending").reduce((sum,b)=>{
          const s=new Date(b.start_at).getTime();
          const e=b.end_at?new Date(b.end_at).getTime():s+45*60000;
          return sum+Math.max(0,Math.round((e-s)/60000));
        },0);
        const dayFull=dayLim>0&&usedMin>=dayLim;
        const pct=dayLim>0?Math.min(100,Math.round(usedMin/dayLim*100)):0;
        const near=dayLim>0&&usedMin>=dayLim*0.85;
        const barCol=dayFull?"#B3362A":(near?"var(--amber)":"var(--orange)");
        return <div key={k} className="card" style={{marginBottom:10,overflow:"hidden",border:today?"2px solid var(--orange)":undefined,opacity:dayBlocked?0.6:1}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",
            background:today?"var(--orange-soft)":"var(--field-bg)",borderBottom:"1px solid var(--line)"}}>
            <div>
              <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,textTransform:"capitalize"}}>{weekdayShort(d)}</span>
                <span style={{fontSize:13,color:"var(--muted)"}}>{dayMonth(d)}.</span>
              </div>
              {dayBlocked
                ? <div style={{fontSize:11.5,color:"#B3362A",marginTop:2}}>Geschlossen</div>
                : <div style={{fontSize:11.5,color:"var(--muted)",marginTop:2}}>{hoursLabel}</div>}
            </div>
            {dayBlocked
              ? <span style={{padding:"6px 12px",borderRadius:8,fontSize:12.5,fontWeight:700,fontFamily:"var(--font-d)",
                  background:"var(--field-bg)",color:"#B3362A",border:"1px solid #B3362A"}}>Geschlossen</span>
              : dayFull
              ? <span style={{padding:"6px 12px",borderRadius:8,fontSize:12.5,fontWeight:700,fontFamily:"var(--font-d)",
                  background:"var(--field-bg)",color:"#B3362A",border:"1px solid #B3362A"}}>Ausgebucht</span>
              : <button onClick={()=>openForm(k)} style={{padding:"6px 12px",borderRadius:8,border:"none",
                  background:"var(--orange)",fontSize:13,fontWeight:700,fontFamily:"var(--font-d)",color:"#fff",
                  display:"inline-flex",alignItems:"center",gap:5}}>+ Termin</button>}
          </div>
          {dayLim>0&&!dayBlocked&&<div style={{padding:"9px 14px",borderBottom:"1px solid var(--line)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
              <span style={{fontSize:11.5,color:"var(--muted)"}}>Belegt an diesem Tag</span>
              <span style={{fontSize:12,fontWeight:700,fontFamily:"var(--font-d)",color:barCol,fontVariantNumeric:"tabular-nums"}}>{usedMin} / {dayLim} Min</span>
            </div>
            <div style={{height:6,borderRadius:99,background:"var(--line)",overflow:"hidden"}}>
              <div style={{height:"100%",width:pct+"%",background:barCol,borderRadius:99}}/>
            </div>
          </div>}
          {list.length===0
            ? <div style={{padding:"11px 14px",fontSize:13,color:"var(--muted)"}}>{dayBlocked?"An diesem Tag werden keine Termine angeboten":"frei"}</div>
            : <div>{list.map((b,i)=>{
                const mine=isMine(b);
                return <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderTop:"1px solid var(--line)",
                  background:mine?"var(--orange-soft)":"transparent"}}>
                  <span style={{minWidth:96,fontFamily:"var(--font-d)",fontWeight:800,fontSize:13.5,fontVariantNumeric:"tabular-nums",color:mine?"var(--orange-deep)":"var(--muted)"}}>
                    {hm(b.start_at)}{b.end_at?" – "+hm(b.end_at):""}
                  </span>
                  {mine
                    ? <span style={{flex:1,fontSize:13.5,fontWeight:700,color:"var(--orange-deep)",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        Dein Termin
                        <span style={{fontSize:11,fontWeight:700,borderRadius:6,padding:"2px 7px",textTransform:"uppercase",letterSpacing:".03em",
                          background:b.status==="pending"?"var(--amber-bg)":"#E3F4E9",color:b.status==="pending"?"#8A5A00":"#1E7B43"}}>
                          {b.status==="pending"?"offen":"bestätigt"}
                        </span>
                      </span>
                    : <span style={{flex:1,fontSize:14,color:"var(--muted)"}}>{b.status==="pending"?"angefragt":"belegt"}</span>}
                </div>;
              })}</div>}
        </div>;
      })}
    </div>

    {form&&<div onClick={()=>setForm(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",width:"100%",maxWidth:560,
        borderTopLeftRadius:20,borderTopRightRadius:20,padding:"20px 18px calc(20px + env(safe-area-inset-bottom))",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:"var(--line)",borderRadius:99,margin:"0 auto 16px"}}/>
        <h3 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:19,marginBottom:16}}>Termin vorschlagen</h3>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div className="field" style={{flex:1}}>
            <label>Vorname</label>
            <input type="text" value={form.vorname} onChange={e=>setForm({...form,vorname:e.target.value})} placeholder="Max"/>
          </div>
          <div className="field" style={{flex:1}}>
            <label>Nachname</label>
            <input type="text" value={form.nachname} onChange={e=>setForm({...form,nachname:e.target.value})} placeholder="Mustermann"/>
          </div>
        </div>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
          Wunschtermine
        </div>
        {form.slots.map((s,i)=>
          <div key={i} style={{border:"1.5px solid var(--line)",borderRadius:12,padding:"12px",marginBottom:10,position:"relative"}}>
            {form.slots.length>1&&<button onClick={()=>removeSlot(i)} aria-label="Entfernen"
              style={{position:"absolute",top:8,right:8,width:24,height:24,borderRadius:6,border:"none",
                background:"var(--field-bg)",color:"#B3362A",fontSize:16,lineHeight:1,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>×</button>}
            <div style={{fontSize:12,fontWeight:700,color:"var(--muted)",marginBottom:8}}>Termin {i+1}</div>
            <div className="field" style={{marginBottom:10}}>
              <label>Datum</label>
              <input type="date" min={ymd(new Date())} value={s.date} onChange={e=>updateSlot(i,{date:e.target.value})}/>
            </div>
            {(()=>{
              // Zeitfenster des gewählten Tages ermitteln, um die Uhrzeit-Felder technisch
              // auf dieses Fenster zu begrenzen (min/max), statt nur hinterher abzulehnen.
              const key=DOW_KEYS[new Date(s.date+"T00:00:00").getDay()];
              const wh=info&&info.work_hours;
              const day=wh&&typeof wh==="object"?wh[key]:null;
              const timeMin=(day&&day.von)?day.von:undefined;
              const timeMax=(day&&day.bis)?day.bis:undefined;
              return <div style={{display:"flex",gap:10}}>
                <div className="field" style={{flex:1}}><label>Von</label>
                  <input type="time" value={s.start} min={timeMin} max={timeMax} onChange={e=>updateSlot(i,{start:e.target.value})}/></div>
                <div className="field" style={{flex:1}}><label>Bis (optional)</label>
                  <input type="time" value={s.end} min={timeMin} max={timeMax} onChange={e=>updateSlot(i,{end:e.target.value})}/></div>
              </div>;
            })()}
            {(()=>{
              const key=DOW_KEYS[new Date(s.date+"T00:00:00").getDay()];
              if(key==="so") return <div style={{fontSize:12,color:"#B3362A",marginTop:7}}>Sonntags werden keine Termine angeboten.</div>;
              const wh=info&&info.work_hours;
              if(!wh||typeof wh!=="object") return null;
              const day=wh[key];
              if(!day) return null; // kein Eintrag = ganztägig buchbar, kein Hinweis nötig
              if(day.blocked) return <div style={{fontSize:12,color:"#B3362A",marginTop:7}}>An diesem Tag werden keine Termine angeboten.</div>;
              if(day.von&&day.bis) return <div style={{fontSize:12,color:"var(--muted)",marginTop:7}}>Arbeitszeit an diesem Tag: {day.von} – {day.bis}</div>;
              return null; // Eintrag ohne Zeiten und ohne Sperrung = ganztägig buchbar
            })()}
            <div style={{background:"var(--orange-soft)",borderRadius:9,padding:"9px 11px",marginTop:8,fontSize:12.5,lineHeight:1.5,color:"var(--ink)"}}>
              Bitte wähle einen Zeitraum zwischen 45 und 90 Minuten, 60 Minuten sind auch möglich. Für eine erste Fahrstunde sind 60 Minuten empfohlen.
            </div>
          </div>)}
        <button className="btn btn-ghost btn-block" style={{marginBottom:14,gap:6,color:"var(--orange-deep)"}} onClick={addSlot}>
          + Weiteren Termin hinzufügen
        </button>
        <div className="field" style={{marginBottom:16}}>
          <label>Nachricht (optional)</label>
          <input type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="z.B. lieber nachmittags"/>
        </div>
        {err&&<div style={{background:"#FDECEA",color:"#B3362A",borderRadius:10,padding:"9px 11px",fontSize:13,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary btn-block" style={{marginBottom:8}} disabled={sending} onClick={send}>
          {sending?"Wird gesendet…":(form.slots.length>1?form.slots.length+" Termine vorschlagen":"Vorschlag senden")}
        </button>
        <p style={{fontSize:11.5,color:"var(--muted)",lineHeight:1.5,textAlign:"center",marginBottom:10}}>
          Mit dem Absenden bestätigst du, die <a href={window.location.origin+"/?datenschutz=1"} target="_blank" rel="noopener noreferrer" style={{color:"var(--orange-deep)",fontWeight:600}}>Datenschutzerklärung</a> gelesen zu haben und mit der Verarbeitung deiner Daten zur Terminvereinbarung einverstanden zu sein.
        </p>
        <button className="btn btn-ghost btn-block" onClick={()=>setForm(null)}>Abbrechen</button>
      </div>
    </div>}
  </div>;
}

function getCalCodeFromURL(){
  try{
    const u=new URL(window.location.href);
    const q=u.searchParams.get("kalender");
    if(q) return q;
    const h=u.hash||"";
    const m=h.match(/kalender[\/=]([A-Za-z0-9]+)/);
    if(m) return m[1];
  }catch(e){}
  return null;
}

// Farbpalette zur Unterscheidung der Fahrlehrer im Kalender
const CAL_COLORS=["#E8871E","#2E7DD1","#1B8F4D","#B3362A","#7A4Fc9","#0C8C8C","#C7511F","#8A6D00"];
// Sicheres Umwandeln in eine Liste: verträgt Array, JSON-Text oder null/undefined.
// (Manche Datenbank-Funktionen liefern jsonb als Text statt als fertige Liste.)
function asArray(v){
  if(Array.isArray(v)) return v;
  if(typeof v==="string"){ try{ const p=JSON.parse(v); return Array.isArray(p)?p:[]; }catch(e){ return []; } }
  return [];
}
function colorForName(name){
  let h=0; const s=(name||"").trim().toLowerCase();
  for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))%CAL_COLORS.length;
  return CAL_COLORS[h];
}

// Gemeinsame Kalender-Ansicht, genutzt vom öffentlichen Link (CalendarPage)
// und in der App (Kalender-Tab). code = cal_code der Fahrschule.
// activeVehicleIds = optionale Einschränkung, welche Fahrzeuge auswählbar sind.
function VehicleCalendar({code, teacherNames, defaultTeacher}){
  const [info,setInfo]=React.useState(undefined); // undefined=lädt, null=ungültig
  const [day,setDay]=React.useState(()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; });
  const [calView,setCalView]=React.useState("tag"); // "tag" | "woche"
  const [vehId,setVehId]=React.useState("");
  const [rows,setRows]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [form,setForm]=React.useState(null); // null | {start,end,teacher,note,busy,error}

  // Infos + Fahrzeuge laden
  React.useEffect(()=>{
    let on=true;
    calInfo(code).then(d=>{ if(!on) return;
      setInfo(d);
      const vs=asArray(d&&d.vehicles);
      // Nur aktive Fahrzeuge, die auch für den Kalender freigegeben sind (calHidden!==true), erstes vorauswählen
      const active=vs.filter(v=>!v.inactive&&!v.calHidden);
      if(active.length) setVehId(active[0].id);
    }).catch(()=>{ if(on) setInfo(null); });
    return ()=>{on=false;};
  },[code]);

  // Buchungen des Tages laden
  const reload=React.useCallback(()=>{
    let von,bis;
    if(calView==="woche"){
      von=startOfWeek(day);
      bis=addDays(startOfWeek(day),7);
    }else{
      von=new Date(day); von.setHours(0,0,0,0);
      bis=new Date(day); bis.setHours(24,0,0,0);
    }
    setLoading(true);
    calBookings(code,von.toISOString(),bis.toISOString())
      .then(r=>{ setRows(r||[]); setLoading(false); })
      .catch(()=>{ setRows([]); setLoading(false); });
  },[code,day,calView]);
  React.useEffect(()=>{ if(info) reload(); },[info,day,calView,reload]);

  // Realtime: bei Änderungen an bookings neu laden (defensiv, falls Realtime nicht verfügbar)
  React.useEffect(()=>{
    if(!info) return;
    let ch=null;
    try{
      if(sb&&typeof sb.channel==="function"){
        ch=sb.channel("cal_"+code)
          .on("postgres_changes",{event:"*",schema:"public",table:"bookings"},()=>reload())
          .subscribe();
      }
    }catch(e){ /* Realtime nicht verfügbar, Kalender funktioniert trotzdem, nur ohne Live-Aktualisierung */ }
    return ()=>{ try{ if(ch) sb.removeChannel(ch); }catch(e){} };
  },[info,code,reload]);

  if(info===undefined) return <div style={{padding:40,textAlign:"center",color:"var(--muted)"}}>Kalender lädt…</div>;
  if(info===null) return <div style={{padding:40,textAlign:"center",color:"var(--muted)"}}>Dieser Kalender-Link ist ungültig.</div>;

  const vehicles=asArray(info.vehicles).filter(v=>!v.inactive&&!v.calHidden);
  const veh=vehicles.find(v=>v.id===vehId);
  const dayRows=rows.filter(r=>r.vehicle_id===vehId).slice().sort((a,b)=>a.start_at.localeCompare(b.start_at));

  const PXH=60, startH=0, endH=24, totalH=endH-startH;
  const hours=[]; for(let h=startH;h<=endH;h++) hours.push(h);
  function yFor(dt){ const d=new Date(dt); const hh=d.getHours()+d.getMinutes()/60; return (hh-startH)*PXH; }

  const dayLabel=day.toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

  function openBookingAt(hour){
    const s=String(hour).padStart(2,"0")+":00";
    const e=(hour+1>=24?"23:59":String(hour+1).padStart(2,"0")+":00");
    setForm({ id:null, start:s, end:e, teacher:defaultTeacher||"", note:"", busy:false, error:"" });
  }
  // Bestehende Buchung antippen: Bearbeiten-Fenster öffnen (mit Löschen unten)
  function openBookingEdit(r){
    setForm({ id:r.id, date:ymd(r.start_at), start:hm(r.start_at), end:hm(r.end_at), teacher:r.teacher_name||"", note:r.note||"", busy:false, error:"" });
  }
  async function saveBooking(){
    const f=form; if(!f) return;
    if(!veh){ setForm({...f,error:"Bitte ein Fahrzeug wählen."}); return; }
    if(!f.teacher.trim()){ setForm({...f,error:"Bitte Fahrlehrer angeben."}); return; }
    if(!f.start||!f.end){ setForm({...f,error:"Bitte Von- und Bis-Zeit angeben."}); return; }
    const basisDatum=f.date||ymd(day); // beim Bearbeiten das Datum der Buchung behalten
    const startISO=new Date(basisDatum+"T"+f.start+":00").toISOString();
    const endISO=new Date(basisDatum+"T"+f.end+":00").toISOString();
    setForm({...f,busy:true,error:""});
    try{
      // Beim Bearbeiten: alte Buchung entfernen, dann neu anlegen (die Datenbank prüft dabei erneut auf Doppelbelegung)
      if(f.id){ await calDelete(code,f.id); }
      await calBook(code,veh.id,f.teacher.trim(),startISO,endISO,f.note);
      setForm(null); reload();
    }catch(e){ setForm({...f,busy:false,error:e.message||"Buchung fehlgeschlagen"}); }
  }
  async function removeBooking(id){
    setForm(f=>f?{...f,busy:true,error:""}:f);
    try{ await calDelete(code,id); setForm(null); reload(); }
    catch(e){ setForm(f=>f?{...f,busy:false,error:"Löschen fehlgeschlagen: "+e.message}:f); }
  }

  return <div style={{maxWidth:640,margin:"0 auto",padding:"0 0 40px"}}>
    {/* Branded Kopf im V3-Stil */}
    <div style={{background:"linear-gradient(135deg, var(--orange) 0%, var(--orange-deep) 100%)",padding:"22px 18px 20px",color:"#fff"}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:44,height:44,borderRadius:12,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:21,lineHeight:1,letterSpacing:".01em"}}>Fahrzeug-Kalender</div>
          <div style={{fontSize:11.5,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",opacity:.9,marginTop:4}}>{info.school_name||"Fahrschule"}</div>
        </div>
      </div>
    </div>

    {/* Umschalter Tag / Woche */}
    <div style={{display:"flex",gap:6,padding:"14px 16px 4px"}}>
      {[["tag","Tag"],["woche","Woche"]].map(([v,lbl])=>
        <button key={v} onClick={()=>setCalView(v)}
          style={{flex:1,padding:"9px 0",borderRadius:11,fontSize:13.5,fontWeight:700,fontFamily:"var(--font-d)",
            border:"1.5px solid "+(calView===v?"var(--orange)":"var(--line)"),
            background:calView===v?"var(--orange)":"var(--card)",color:calView===v?"#fff":"var(--ink)"}}>{lbl}</button>)}
    </div>

    {/* Navigation (Tag oder Woche) */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"8px 16px 12px"}}>
      <button onClick={()=>{ const d=new Date(day); d.setDate(d.getDate()-(calView==="woche"?7:1)); setDay(d); }}
        style={{width:38,height:38,borderRadius:11,border:"1.5px solid var(--line)",background:"var(--card)",color:"var(--ink)",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
      <div style={{flex:1,textAlign:"center"}}>
        {calView==="woche"
          ? <><div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,lineHeight:1.1}}>Woche</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:1}}>{startOfWeek(day).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})} – {addDays(startOfWeek(day),6).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}</div></>
          : <><div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,lineHeight:1.1}}>{isToday(day)?"Heute":dayLabel.split(",")[0]}</div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:1}}>{dayLabel.split(",").slice(1).join(",").trim()}</div></>}
      </div>
      <button onClick={()=>{ const d=new Date(day); d.setDate(d.getDate()+(calView==="woche"?7:1)); setDay(d); }}
        style={{width:38,height:38,borderRadius:11,border:"1.5px solid var(--line)",background:"var(--card)",color:"var(--ink)",fontSize:18,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
    </div>

    {/* Fahrzeug-Tabs */}
    {vehicles.length===0
      ? <div style={{margin:"0 16px",padding:"16px",borderRadius:14,background:"var(--field-bg)",border:"1px solid var(--line)",fontSize:13.5,color:"var(--muted)",textAlign:"center"}}>Für diese Fahrschule sind keine Fahrzeuge hinterlegt.</div>
      : vehicles.length>1 && <div style={{display:"flex",gap:8,overflowX:"auto",padding:"0 16px 14px"}}>
          {vehicles.map(v=>
            <button key={v.id} onClick={()=>setVehId(v.id)}
              style={{flexShrink:0,padding:"9px 15px",borderRadius:99,fontSize:13,fontWeight:700,fontFamily:"var(--font-d)",
                border:"1.5px solid "+(v.id===vehId?"var(--orange)":"var(--line)"),
                background:v.id===vehId?"var(--orange)":"var(--card)",color:v.id===vehId?"#fff":"var(--ink)"}}>
              {v.name}
            </button>)}
        </div>}

    {/* Zeitstrahl (Tagesansicht) */}
    {veh&&calView==="tag"&&<div className="card" style={{margin:"0 16px",overflow:"hidden"}}>
      <div style={{padding:"12px 0",fontFamily:"var(--font-d)",fontWeight:800,fontSize:14,textAlign:"center",borderBottom:"1px solid var(--line)",color:"var(--orange-deep)"}}>
        {veh.name}{veh.plate?" · "+veh.plate:""}{veh.type?" · "+veh.type:""}
      </div>
      <div style={{position:"relative",height:totalH*PXH+24,paddingLeft:50}}>
        {hours.slice(0,-1).map(h=>
          <div key={h} onClick={()=>openBookingAt(h)}
            style={{position:"absolute",left:50,right:0,top:12+(h-startH)*PXH,height:PXH,borderTop:"1px solid var(--line)",cursor:"pointer"}}
            title="Zum Buchen tippen"/>
        )}
        {hours.map(h=>
          <span key={"lbl"+h} style={{position:"absolute",left:0,top:12+(h-startH)*PXH-8,width:42,textAlign:"right",fontSize:11,color:"var(--muted)",fontFamily:"var(--font-d)",pointerEvents:"none"}}>{String(h).padStart(2,"0")}:00</span>
        )}
        {isToday(day)&&(()=>{ const ny=12+yFor(new Date()); return (ny>=12&&ny<=totalH*PXH+12)?<div style={{position:"absolute",left:50,right:0,top:ny,borderTop:"2px solid #D63A2E",zIndex:2,pointerEvents:"none"}}><div style={{position:"absolute",left:-5,top:-4,width:8,height:8,borderRadius:"50%",background:"#D63A2E"}}/></div>:null; })()}
        {dayRows.map(r=>{
          const top=12+Math.max(0,yFor(r.start_at));
          const h=Math.max(24,yFor(r.end_at)-yFor(r.start_at));
          const c=colorForName(r.teacher_name);
          return <button key={r.id} onClick={()=>openBookingEdit(r)}
            style={{position:"absolute",top,height:h,left:56,right:8,background:c+"22",border:"1.5px solid "+c,borderRadius:8,padding:"5px 9px",overflow:"hidden",textAlign:"left",zIndex:3}}>
            <div style={{fontSize:11,fontWeight:800,fontFamily:"var(--font-d)",color:c}}>{hm(r.start_at)}–{hm(r.end_at)}</div>
            <div style={{fontSize:12.5,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.teacher_name}</div>
            {r.note&&h>52&&<div style={{fontSize:11,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.note}</div>}
          </button>;
        })}
      </div>
    </div>}
    {veh&&calView==="tag"&&<div style={{textAlign:"center",fontSize:12,color:"var(--muted)",marginTop:10}}>Tippe auf eine freie Zeit zum Buchen. Tippe auf eine Buchung zum Löschen.</div>}

    {/* Wochenansicht */}
    {veh&&calView==="woche"&&<div style={{padding:"0 16px"}}>
      <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:14,textAlign:"center",color:"var(--orange-deep)",marginBottom:10}}>
        {veh.name}{veh.plate?" · "+veh.plate:""}
      </div>
      {[0,1,2,3,4,5,6].map(off=>{
        const d=addDays(startOfWeek(day),off);
        const dstr=ymd(d);
        const list=rows.filter(r=>r.vehicle_id===vehId && ymd(r.start_at)===dstr).slice().sort((a,b)=>a.start_at.localeCompare(b.start_at));
        const heute=ymd(new Date())===dstr;
        return <div key={off} className="card" style={{padding:"11px 13px",marginBottom:8,border:heute?"1.5px solid var(--orange)":"1px solid var(--line)"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:list.length?8:0}}>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:14}}>
              {d.toLocaleDateString("de-DE",{weekday:"long"})} <span style={{color:"var(--muted)",fontWeight:600,fontSize:12.5}}>{d.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})}</span>{heute?<span style={{color:"var(--orange-deep)",fontSize:11.5,marginLeft:6}}>Heute</span>:null}
            </div>
            <button onClick={()=>{ setDay(new Date(dstr+"T00:00:00")); setCalView("tag"); }}
              style={{border:"none",background:"none",color:"var(--orange-deep)",fontSize:12.5,fontWeight:700,padding:"2px 4px"}}>Tag öffnen ›</button>
          </div>
          {list.length===0
            ? <div style={{fontSize:12.5,color:"var(--muted)"}}>Keine Buchung</div>
            : <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {list.map(r=>{ const c=colorForName(r.teacher_name);
                  return <button key={r.id} onClick={()=>openBookingEdit(r)}
                    style={{display:"flex",alignItems:"center",gap:9,background:c+"18",border:"1px solid "+c,borderRadius:9,padding:"7px 10px",textAlign:"left"}}>
                    <div style={{width:4,height:30,borderRadius:99,background:c,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:12.5,fontWeight:700,fontFamily:"var(--font-d)"}}>{hm(r.start_at)}–{hm(r.end_at)} · {r.teacher_name}</div>
                      {r.note&&<div style={{fontSize:11.5,color:"var(--muted)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.note}</div>}
                    </div>
                  </button>;
                })}
              </div>}
        </div>;
      })}
      <div style={{textAlign:"center",fontSize:12,color:"var(--muted)",marginTop:4,marginBottom:8}}>Zum Buchen einen Tag öffnen. Tippe auf eine Buchung zum Löschen.</div>
    </div>}

    {/* Buchungs-Formular */}
    {form&&<div onClick={()=>!form.busy&&setForm(null)}
      style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",width:"100%",maxWidth:560,borderTopLeftRadius:20,borderTopRightRadius:20,padding:"20px 18px calc(20px + env(safe-area-inset-bottom))",maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:"var(--line)",borderRadius:99,margin:"0 auto 16px"}}/>
        <h3 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:19,marginBottom:4}}>{form.id?"Buchung bearbeiten":"Fahrzeug buchen"}</h3>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:16}}>{veh?veh.name:""} · {new Date((form.date||ymd(day))+"T00:00:00").toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long"})}</p>

        <div className="field" style={{marginBottom:12}}>
          <label>Fahrlehrer</label>
          {(teacherNames&&teacherNames.length)
            ? <select value={form.teacher} onChange={e=>setForm({...form,teacher:e.target.value})}
                style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"12px 13px",fontSize:16,background:"var(--card)"}}>
                <option value="">Bitte wählen…</option>
                {teacherNames.map(n=><option key={n} value={n}>{n}</option>)}
              </select>
            : <input type="text" value={form.teacher} onChange={e=>setForm({...form,teacher:e.target.value})} placeholder="Name des Fahrlehrers"/>}
        </div>

        <div style={{display:"flex",gap:10,marginBottom:10}}>
          <div className="field" style={{flex:1}}>
            <label>Von</label>
            <input type="time" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/>
          </div>
          <div className="field" style={{flex:1}}>
            <label>Bis</label>
            <input type="time" value={form.end} onChange={e=>setForm({...form,end:e.target.value})}/>
          </div>
        </div>

        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Startzeit · Viertelstunde</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[":00",":15",":30",":45"].map(mm=>{
              const hh=(form.start||"09:00").split(":")[0];
              const val=hh+mm;
              const active=form.start===val;
              return <button key={mm} onClick={()=>setForm({...form,start:val})}
                style={{padding:"6px 12px",borderRadius:99,fontSize:13,fontWeight:700,fontFamily:"var(--font-d)",border:"1.5px solid "+(active?"var(--orange)":"var(--line)"),background:active?"var(--orange-soft)":"var(--card)",color:active?"var(--orange-deep)":"var(--ink)"}}>{mm}</button>;
            })}
          </div>
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",color:"var(--muted)",marginBottom:6}}>Dauer</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[45,55,60,90,135].map(min=>
              <button key={min} onClick={()=>setForm({...form,end:addMinutesToTime(form.start||"09:00",min)})}
                style={{padding:"6px 12px",borderRadius:99,fontSize:13,fontWeight:700,fontFamily:"var(--font-d)",border:"1.5px solid var(--line)",background:"var(--card)",color:"var(--ink)"}}>
                {min===45?"1 FS":min===55?"Prüfung":min===60?"1 Std":min===90?"2 FS":min===135?"3 FS":min+" min"} ({min} min)
              </button>)}
          </div>
        </div>

        <div className="field" style={{marginBottom:16}}>
          <label>Notiz (optional)</label>
          <input type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="z.B. Prüfung, Schülername"/>
        </div>

        {form.error&&<div style={{fontSize:13,color:"#B3362A",marginBottom:12}}>{form.error}</div>}
        <button className="btn btn-primary btn-block" style={{marginBottom:8}} disabled={form.busy} onClick={saveBooking}>{form.busy?"Wird gespeichert…":(form.id?"Änderungen speichern":"Buchen")}</button>
        <button className="btn btn-ghost btn-block" style={{marginBottom:form.id?8:0}} disabled={form.busy} onClick={()=>setForm(null)}>Abbrechen</button>
        {form.id&&<button className="btn btn-ghost btn-block" disabled={form.busy}
          style={{color:"#B3362A",borderColor:"#E7B8B2"}}
          onClick={()=>{ if(confirm("Diese Buchung wirklich löschen?")) removeBooking(form.id); }}>Buchung löschen</button>}
      </div>
    </div>}
  </div>;
}

// Öffentliche Kalender-Seite (für den teilbaren Link, ohne App-Konto)
function CalendarPage({code}){
  return <div style={{minHeight:"100vh",background:"var(--paper)"}}>
    <VehicleCalendar code={code}/>
  </div>;
}

// Öffentlich zugängliche Datenschutzerklärung (kein Login nötig), z.B. verlinkt von der
// Buchungsseite aus, wo ein Schüler noch nicht angemeldet ist.
function PublicPrivacyPage(){
  const P=(t)=><p style={{fontSize:13.5,color:"var(--ink-2)",lineHeight:1.65,marginBottom:12}}>{t}</p>;
  const H=(t)=><div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,marginTop:20,marginBottom:8}}>{t}</div>;
  return <div style={{minHeight:"100vh",background:"var(--paper)",padding:"24px 16px"}}>
    <div style={{maxWidth:520,margin:"0 auto"}}>
      <h2 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:21,marginBottom:14}}>Datenschutzerklärung</h2>
      <div className="card" style={{padding:"16px 16px 4px"}}>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:6}}>Stand: Juli 2026</div>
        {H("1. Verantwortlicher")}
        {P("Verantwortlich für die Datenverarbeitung im Sinne der Datenschutz-Grundverordnung (DSGVO) ist:")}
        <div style={{background:"var(--field-bg)",borderRadius:10,padding:"10px 12px",fontSize:13.5,lineHeight:1.6,marginBottom:12}}>
          Fabian Bürkle<br/>Geroldseckerstr. 62<br/>77656 Offenburg<br/>E-Mail: buerkle.fabian.p@web.de
        </div>
        {H("2. Welche Daten wir verarbeiten")}
        {P("Von Fahrlehrern: Name, Anschrift, Telefonnummer, Geburtsdatum, E-Mail-Adresse, sowie Nutzungsdaten der App (z.B. Termine, Fahrschüler-Zuordnung).")}
        {P("Von Fahrschülern: Name, Kontaktdaten (sofern vom Fahrlehrer eingetragen), Ausbildungsfortschritt (ADK, Strecken, Fahrstunden), Termine, sowie ggf. Fotos, die zur automatischen Übertragung von Ausbildungsdaten hochgeladen werden.")}
        {P("Zahlungsbezogene Daten: Sofern ein Monatsabo aktiv ist, wird das Datum der letzten Zahlung gespeichert. Die eigentliche Zahlung läuft über PayPal; wir erhalten dabei keine Zugangsdaten zu eurem PayPal-Konto.")}
        {H("3. Zweck der Verarbeitung")}
        {P("Die Daten werden ausschließlich zur Organisation der Fahrausbildung verwendet: Terminplanung, Dokumentation des Ausbildungsstands, Kommunikation zwischen Fahrlehrer und Fahrschüler, sowie zur Abrechnung des Nutzungsentgelts der App.")}
        {H("4. Wo die Daten gespeichert werden")}
        {P("Die Daten werden bei Supabase gespeichert und verarbeitet, einem Anbieter für Datenbank-Infrastruktur. Die Anwendung selbst wird über Netlify bereitgestellt.")}
        {P("Für die automatische Erkennung von ADK-Karten aus Fotos werden hochgeladene Bilder zur Verarbeitung an Anthropic (Anbieter der verwendeten KI) übermittelt.")}
        {H("5. Weitergabe an Dritte")}
        {P("Eine Weitergabe an Dritte erfolgt nur, soweit dies zur Erbringung der genannten Zwecke technisch notwendig ist (Hosting-, Datenbank- und KI-Dienstleister wie oben genannt), oder soweit eine gesetzliche Pflicht dazu besteht.")}
        {H("6. Speicherdauer")}
        {P("Die Daten werden gespeichert, solange ein Nutzungsverhältnis besteht. Nach Löschung eines Kontos werden die zugehörigen Daten gelöscht, soweit keine gesetzliche Aufbewahrungspflicht entgegensteht.")}
        {H("7. Rechte der betroffenen Personen")}
        {P("Jede betroffene Person hat das Recht auf Auskunft, Berichtigung, Löschung und Einschränkung der Verarbeitung ihrer Daten, sowie das Recht auf Datenübertragbarkeit und Widerspruch. Anfragen dazu richten Sie bitte an die oben genannte Kontaktadresse.")}
        {H("8. Beschwerderecht")}
        {P("Betroffene Personen haben das Recht, sich bei einer Datenschutz-Aufsichtsbehörde zu beschweren, wenn sie der Ansicht sind, dass die Verarbeitung ihrer Daten gegen die DSGVO verstößt.")}
        <div style={{background:"#FDECEA",borderRadius:10,padding:"12px 13px",margin:"18px 0",fontSize:12.5,color:"#8A2E24",lineHeight:1.6}}>
          Dieser Text ist ein sachlicher Entwurf und ersetzt keine Rechtsberatung.
        </div>
      </div>
    </div>
  </div>;
}

function Root(){
  const code=getBookingCodeFromURL();
  if(code) return <BookingPage code={code}/>;
  const calCode=getCalCodeFromURL();
  if(calCode) return <CalendarPage code={calCode}/>;
  try{ if(new URL(window.location.href).searchParams.get("datenschutz")==="1") return <PublicPrivacyPage/>; }catch(e){}
  return <App/>;
}



ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
</body>
