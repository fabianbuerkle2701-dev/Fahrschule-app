<style>
  :root{
    --orange:#FF9300; --orange-deep:#E07C00; --orange-soft:#FFF3E0;
    --ink:#181512; --ink-2:#3A352F; --muted:#8A8378;
    --paper:#F6F1E7; --card:#FFFFFF; --line:#E8E0D2;
    --green:#1E7A46; --green-bg:#DDF3E5;
    --blue:#2E5E8C; --blue-bg:#DEEBF8;
    --amber:#B97E0A; --amber-bg:#FFF1CC;
    --field-bg:#FBF8F1; --note-bg:#FFFDF8;
    --tabbar:#181512;
    --radius:16px;
    --font-d:'Barlow Semi Condensed',system-ui,sans-serif;
    --font-b:'Barlow',system-ui,sans-serif;
  }
  [data-theme="dark"]{
    --orange:#FF9F1A; --orange-deep:#FFB84D; --orange-soft:#312A1C;
    --ink:#ECEAE5; --ink-2:#C5C2BA; --muted:#928E85;
    --paper:#262524; --card:#30302E; --line:#42423F;
    --green:#4BC07E; --green-bg:#1E3326;
    --blue:#6FA8DC; --blue-bg:#1E2C3A;
    --amber:#E0B250; --amber-bg:#3A3018;
    --field-bg:#2B2A28; --note-bg:#2D2C29;
    --tabbar:#1C1B1A;
  }
  [data-theme="dark"] ::-webkit-scrollbar-thumb{background:#55544f}
  [data-theme="dark"] .box{background:#2B2A28;border-color:#4a4843}
  [data-theme="dark"] .box.on{background:var(--orange);border-color:#000}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{font-family:var(--font-b);background:var(--ink);color:var(--ink)}
  #root{min-height:100vh}
  input,textarea,button,select{font-family:inherit;font-size:inherit}
  input,textarea,select{color:var(--ink);background:var(--card)}
  input::placeholder,textarea::placeholder{color:var(--muted);opacity:1}
  [data-theme="dark"] input,[data-theme="dark"] textarea,[data-theme="dark"] select{color:var(--ink)}
  input[type="date"]{color:var(--ink)}
  [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1)}
  button{cursor:pointer;border:none;background:none}
  button:active{transform:scale(.96)}
  :focus-visible{outline:3px solid var(--orange);outline-offset:2px;border-radius:6px}
  ::-webkit-scrollbar{height:5px;width:5px}
  ::-webkit-scrollbar-thumb{background:#cbc2b2;border-radius:3px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  .shell{max-width:560px;margin:0 auto;background:var(--paper);min-height:100vh;position:relative;
    box-shadow:0 0 60px rgba(0,0,0,.45)}
  /* ── Topbar: the orange card ── */
  .topbar{background:var(--orange);color:var(--ink);
    padding:calc(14px + env(safe-area-inset-top)) 18px 12px;
    position:sticky;top:0;z-index:30;border-bottom:3px solid var(--ink)}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand img{width:40px;height:40px;border-radius:50%;background:#fff;padding:3px;border:2px solid var(--ink)}
  .brand-name{font-family:var(--font-d);font-weight:800;font-size:19px;letter-spacing:.02em;line-height:1}
  .brand-sub{font-size:11px;font-weight:600;color:var(--ink-2);letter-spacing:.06em;text-transform:uppercase;margin-top:3px}
  .save-pill{font-size:11px;font-weight:700;background:var(--ink);color:var(--orange);
    border-radius:99px;padding:5px 11px;white-space:nowrap}

  /* ── Cards & sections ── */
  .pad{padding:14px 14px 104px}
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);
    box-shadow:0 1px 2px rgba(24,21,18,.05)}
  .eyebrow{font-family:var(--font-d);font-weight:700;font-size:12px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--muted);margin:18px 6px 8px}
  .sec{border-left:5px solid;overflow:hidden;margin-bottom:10px}
  .sec-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:13px 14px;text-align:left;background:var(--card)}
  .sec-title{font-family:var(--font-d);font-weight:700;font-size:16px;line-height:1.15}
  .sec-meta{display:flex;align-items:center;gap:9px;flex-shrink:0}
  .sec-pct{font-family:var(--font-d);font-weight:800;font-size:15px;font-variant-numeric:tabular-nums}
  .chev{transition:transform .18s;color:var(--muted)}
  .chev.open{transform:rotate(180deg)}
  .bar{background:#EFE9DD;border-radius:99px;height:6px;overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:99px;transition:width .35s cubic-bezier(.2,.8,.2,1)}
  .row{display:flex;align-items:center;gap:12px;padding:9px 12px;border-top:1px solid #F2EDE3}
  .row-label{flex:1;min-width:0;font-size:15px;font-weight:500;line-height:1.25}
  .row-dates{font-size:11px;color:var(--muted);margin-top:2px;font-variant-numeric:tabular-nums}
  .row-count{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:6px;font-variant-numeric:tabular-nums}

  /* ── Level dot ── */
  .dot{width:46px;height:46px;min-width:46px;border-radius:13px;border:2.5px solid;
    font-family:var(--font-d);font-weight:800;font-size:18px;display:flex;align-items:center;justify-content:center;
    transition:background .15s,border-color .15s}

  /* ── Count boxes (the □ from the card) ── */
  .boxes{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .box{width:32px;height:32px;border:2.5px solid #C9BFAC;border-radius:7px;background:#FBF8F1;
    display:flex;align-items:center;justify-content:center;transition:all .15s}
  .box.on{background:var(--orange);border-color:var(--ink)}
  .box svg{opacity:0;transform:scale(.5);transition:all .15s}
  .box.on svg{opacity:1;transform:scale(1)}

  /* ── Student list ── */
  .stud{display:flex;align-items:center;gap:13px;padding:13px 14px;margin-bottom:10px;width:100%;text-align:left}
  .stud.active{border-color:var(--orange);border-width:2px}
  .avatar{width:46px;height:46px;min-width:46px;border-radius:50%;background:var(--ink);color:var(--orange);
    font-family:var(--font-d);font-weight:800;font-size:17px;display:flex;align-items:center;justify-content:center}
  .stud-name{font-family:var(--font-d);font-weight:700;font-size:17px;line-height:1.1}
  .stud-meta{font-size:12px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums}
  .del{color:#B3362A;font-size:19px;font-weight:800;line-height:1;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
  .del:active{background:rgba(179,54,42,.12)}

  /* ── Buttons ── */
  .btn{font-family:var(--font-d);font-weight:700;font-size:14.5px;letter-spacing:.02em;
    border-radius:12px;padding:11px 16px;display:inline-flex;align-items:center;gap:7px;justify-content:center}
  .btn-primary{background:var(--orange);color:var(--ink);border:2px solid var(--ink)}
  .btn-ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line)}
  .btn-block{width:100%}

  /* ── Segmented control ── */
  .seg{display:flex;gap:4px;background:#EDE6D8;border-radius:13px;padding:4px;margin-bottom:14px}
  .seg button{flex:1;border-radius:10px;padding:9px 6px;font-family:var(--font-d);font-weight:700;font-size:13.5px;color:var(--muted)}
  .seg button.on{background:var(--ink);color:var(--orange);box-shadow:0 1px 3px rgba(0,0,0,.18)}

  /* ── Forms ── */
  .field{margin-bottom:12px}
  .field label{font-family:var(--font-d);font-weight:700;font-size:11.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
  .field input,.field textarea{width:100%;border:1.5px solid var(--line);border-radius:11px;
    padding:11px 13px;font-size:16px;background:var(--card)}
  .field input:focus,.field textarea:focus{border-color:var(--orange);outline:none}
  .check{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:500}
  .check input{width:21px;height:21px;accent-color:var(--orange)}

  /* ── Tab bar ── */
  .tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
    background:var(--tabbar);display:flex;padding:8px 4px calc(10px + env(safe-area-inset-bottom));z-index:48}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;
    color:#7d766c;font-family:var(--font-d);font-weight:600;font-size:10.5px;letter-spacing:.03em;border-radius:10px}
  .tab.on{color:var(--orange)}
  .tab svg{display:block;width:21px;height:21px}
  .tabpop{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:6px;z-index:50;
    box-shadow:0 8px 30px rgba(0,0,0,.28);min-width:190px;max-width:80vw;animation:popup .15s ease}
  @keyframes popup{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  .tabpop::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:7px solid transparent;border-top-color:var(--card)}
  /* rechts ausgerichtet (für den letzten Reiter, damit nichts über den Rand ragt) */
  .tabpop.right{left:auto;right:6px;transform:none;animation:popupR .15s ease}
  @keyframes popupR{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .tabpop.right::after{left:auto;right:22px;transform:none}
  .tabpop-item{display:flex;align-items:center;gap:10px;width:100%;padding:11px 13px;border-radius:10px;
    font-family:var(--font-d);font-weight:700;font-size:14.5px;color:var(--ink);text-align:left;white-space:nowrap}
  .tabpop-item:active{background:var(--field-bg)}
  .tabpop-item.on{background:var(--orange-soft);color:var(--orange-deep)}
  .tabpop-ic{display:inline-flex;color:var(--muted);flex-shrink:0}
  .tabpop-item.on .tabpop-ic{color:var(--orange-deep)}

  /* ── Header strip (chips) ── */
  .strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px}
  .chip{flex-shrink:0;background:var(--card);border:1.5px solid var(--line);border-radius:12px;
    padding:7px 11px;text-align:center;min-width:62px}
  .chip b{display:block;font-family:var(--font-d);font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
  .chip span{font-size:9.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

  /* ── Hero totals ── */
  .hero{padding:18px 16px;text-align:center;margin-bottom:12px}
  .hero .label{font-family:var(--font-d);font-weight:700;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .hero .num{font-family:var(--font-d);font-weight:800;font-size:52px;line-height:1.05;font-variant-numeric:tabular-nums}

  /* ── Print sheet ── */
  .print-sheet{display:none}
  @media print{
    body{background:#fff}
    .app{display:none!important}
    .print-sheet{display:block!important;font-family:var(--font-b);color:#000;padding:0;font-size:11px}
    .ps-head{display:flex;align-items:center;gap:12px;border-bottom:2.5px solid #000;padding-bottom:8px;margin-bottom:10px}
    .ps-head img{width:46px;height:46px}
    .ps-title{font-family:var(--font-d);font-weight:800;font-size:19px}
    .ps-sub{font-size:11px;color:#444}
    .ps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 18px;margin-bottom:12px}
    .ps-grid div{font-size:11px}
    .ps-grid b{font-weight:700}
    .ps-sec{margin-bottom:8px;break-inside:avoid}
    .ps-sec h3{font-family:var(--font-d);font-size:12.5px;font-weight:800;text-transform:uppercase;
      letter-spacing:.05em;border-bottom:1.5px solid #000;padding-bottom:2px;margin-bottom:3px}
    .ps-row{display:flex;justify-content:space-between;gap:10px;padding:1.5px 0;border-bottom:.5px solid #ddd}
    .ps-row .l{flex:1}
    .ps-row .r{font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
    /* Friendly variant */
    .pf-hero{text-align:center;border:2.5px solid #000;border-radius:12px;padding:14px;margin-bottom:14px}
    .pf-hero .big{font-family:var(--font-d);font-weight:800;font-size:46px;line-height:1}
    .pf-hero .lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#444;margin-top:4px}
    .pf-stats{display:flex;gap:10px;margin-bottom:14px}
    .pf-stat{flex:1;border:1.5px solid #000;border-radius:10px;padding:9px;text-align:center}
    .pf-stat b{font-family:var(--font-d);font-weight:800;font-size:22px;display:block}
    .pf-stat span{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#444}
    .pf-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
    .pf-bar-row .name{width:170px;font-size:11.5px;font-weight:600;flex-shrink:0}
    .pf-bar{flex:1;height:13px;border:1px solid #000;border-radius:99px;overflow:hidden;background:#fff}
    .pf-bar i{display:block;height:100%;background:#000}
    .pf-bar-row .pct{width:38px;text-align:right;font-weight:800;font-size:12px;font-variant-numeric:tabular-nums}
    .pf-missing{border:1.5px solid #000;border-radius:10px;padding:11px 13px;margin-top:6px;break-inside:avoid}
    .pf-missing h3{font-family:var(--font-d);font-size:13px;font-weight:800;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
    .pf-missing ul{margin:0;padding-left:18px}
    .pf-missing li{font-size:11.5px;margin-bottom:2px}
    .pf-ready{border:2px solid #000;border-radius:10px;padding:16px;text-align:center;font-family:var(--font-d);font-weight:800;font-size:18px;margin-top:6px}
    body[data-print="friendly"] .ps-detail{display:none!important}
    body[data-print="friendly"] .ps-nachweis{display:none!important}
    body[data-print="detail"] .ps-friendly{display:none!important}
    body[data-print="detail"] .ps-nachweis{display:none!important}
    body[data-print="nachweis"] .ps-friendly{display:none!important}
    body[data-print="nachweis"] .ps-detail{display:none!important}
    body:not([data-print]) .ps-friendly{display:none!important}
    body:not([data-print]) .ps-nachweis{display:none!important}
    @page{size:A4;margin:13mm}
  }
  body[data-print="friendly"] .ps-detail{display:none}
  body[data-print="friendly"] .ps-nachweis{display:none}
  body[data-print="detail"] .ps-friendly{display:none}
  body[data-print="detail"] .ps-nachweis{display:none}
  body[data-print="nachweis"] .ps-friendly{display:none}
  body[data-print="nachweis"] .ps-detail{display:none}
</style>
</head>

// Map a DB row -> app student object (data holds everything; id/owner/shared come from row)
function rowToStudent(row){
  const d = row.data||{};
  return { ...d, id:row.id, _owner:row.owner, _shared:row.shared_with||[], _isMine:true };
}
// Fetch all students visible to me (mine + shared with me)
async function fetchStudents(uid){
  // Ausdrücklich nur eigene + mit mir geteilte Schüler laden.
  // Wichtig: Der Admin hat per DB-Regel Zugriff auf ALLE Schüler (für die Zählung),
  // aber im normalen Schüler-Reiter soll er trotzdem nur seine eigenen sehen.
  const { data, error } = await sb.from("students").select("*")
    .or("owner.eq."+uid+",shared_with.cs.{"+uid+"}")
    .order("created_at",{ascending:true});
  if(error){ console.error(error); throw new Error("DB-Fehler beim Laden: "+(error.message||JSON.stringify(error))); }
  return (data||[]).map(r=>({ ...rowToStudent(r), _isMine: r.owner===uid }));
}
// Strip internal fields before saving data jsonb
function cleanData(s){
  const { id,_owner,_shared,_isMine, ...rest } = s;
  return rest;
}
async function dbInsert(uid,s){
  const { data, error } = await sb.from("students")
    .insert({ owner:uid, data:cleanData(s), shared_with:[] }).select().single();
  if(error){ console.error(error); return null; }
  return { ...rowToStudent(data), _isMine:true };
}
async function dbUpdate(s){
  const { error } = await sb.from("students")
    .update({ data:cleanData(s), updated_at:new Date().toISOString() }).eq("id",s.id);
  if(error) console.error(error);
}

}

}

async function fetchTemplate(uid, schoolName){
  const { data, error } = await sb.from("templates").select("*").eq("owner",uid).maybeSingle();
  if(error){ console.error(error); throw new Error("Vorlage laden fehlgeschlagen: "+(error.message||"")); }
  if(data && Array.isArray(data.adk) && data.adk.length){
    return { adk:data.adk, strecken:Array.isArray(data.strecken)?data.strecken:[] };
  }

  const fresh = isV3

    : { adk:deepCopy(BVF_ADK), strecken:[] };
  const { error:e2 } = await sb.from("templates").upsert({ owner:uid, adk:fresh.adk, strecken:fresh.strecken });

  const { data:schools, error } = await sb.from("schools").select("*").order("created_at",{ascending:true});
  if(error){ console.error(error); throw new Error(error.message); }
  // Fahrlehrer pro Fahrschule
  const { data:profs } = await sb.from("profiles").select("id,school_id");
  // Schüler pro owner -> wir brauchen owner->school. profiles liefert id(=owner)->school_id
  const ownerSchool={}; (profs||[]).forEach(p=>{ ownerSchool[p.id]=p.school_id; });
  const { data:studs } = await sb.from("students").select("owner");
  const teacherCount={}, studentCount={};
  (profs||[]).forEach(p=>{ if(p.school_id) teacherCount[p.school_id]=(teacherCount[p.school_id]||0)+1; });
  (studs||[]).forEach(s=>{ const sid=ownerSchool[s.owner]; if(sid) studentCount[sid]=(studentCount[sid]||0)+1; });
  return (schools||[]).map(sc=>({ ...sc, teachers:teacherCount[sc.id]||0, students:studentCount[sc.id]||0 }));
}

// Hellere/dunklere Variante einer Hex-Farbe (für --orange-deep, hover etc.)
function shade(hex,pct){
  try{
    const h=hex.replace("#","");
    const n=parseInt(h.length===3?h.split("").map(c=>c+c).join(""):h,16);
    let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
    r=Math.round(r+(pct<0?r:255-r)*pct/100*(pct<0?-1:1));
    g=Math.round(g+(pct<0?g:255-g)*pct/100*(pct<0?-1:1));
    b=Math.round(b+(pct<0?b:255-b)*pct/100*(pct<0?-1:1));
    r=Math.max(0,Math.min(255,r)); g=Math.max(0,Math.min(255,g)); b=Math.max(0,Math.min(255,b));
    return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
  }catch(e){ return hex; }
}

// Bild auf max. 256px verkleinern und als data-URL (PNG) zurückgeben
function resizeImageToDataURL(file,maxSize){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(new Error("Datei konnte nicht gelesen werden"));
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject(new Error("Bild konnte nicht geladen werden"));
      img.onload=()=>{
        const m=maxSize||256;
        let w=img.width,h=img.height;
        if(w>h){ if(w>m){ h=Math.round(h*m/w); w=m; } }
        else { if(h>m){ w=Math.round(w*m/h); h=m; } }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        try{ resolve(canvas.toDataURL("image/png")); }
        catch(e){ reject(new Error("Bild konnte nicht umgewandelt werden")); }
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

/* ════════ Levels & Progress ════════ */
const LEVELS = [
  {v:0,sym:"",bg:"#F4EFE5",fg:"#C9BFAC",border:"#DDD4C2",name:"offen"},
  {v:1,sym:"B",bg:"var(--amber-bg)",fg:"var(--amber)",border:"#E3B94B",name:"Besprochen"},
  {v:2,sym:"Ü",bg:"var(--blue-bg)",fg:"var(--blue)",border:"#7AA8D4",name:"Geübt"},
  {v:3,sym:"✓",bg:"var(--green-bg)",fg:"var(--green)",border:"#5FBF8B",name:"Beherrscht"},
];
function allLernIds(adk){ return adk.flatMap(s=>s.items.map(i=>i.id)); }
// ADK is now count-based like strecken. Old data stored {level,dates}; migrate on read:
// old level 3 (beherrscht) -> full count done, else 0.
function adkDone(stu,item){
  const v=stu.items&&stu.items[item.id];
  if(v==null) return 0;
  if(typeof v==="number") return v;
  if(typeof v==="object"){ // legacy {level,dates}
    const lv=v.level||0; const c=effCount(stu,item);
    return lv>=3 ? c : (lv>=2 ? Math.min(1,c) : 0);
  }
  return 0;
}
function calcLern(items,adk,stu){ // stu optional; fall back to items-only
  const s=stu||{items};
  let soll=0,done=0;
  adk.forEach(sec=>sec.items.forEach(it=>{ const c=effCount(s,it); soll+=c; done+=Math.min(adkDone(s,it),c); }));
  return soll?Math.round(done/soll*100):0;
}
function calcBack(stu,strecken){ const str=stu.strecken||{}; let soll=0,done=0;
  strecken.forEach(sec=>sec.items.forEach(it=>{ const c=effCount(stu,it); soll+=c; done+=Math.min(str[it.id]||0,c); }));
  return soll?Math.round(done/soll*100):0; }
function secLern(stu,sec){ let soll=0,done=0;
  sec.items.forEach(it=>{ const c=effCount(stu,it); soll+=c; done+=Math.min(adkDone(stu,it),c); });
  return soll?Math.round(done/soll*100):0; }
function secBack(stu,sec){ const str=stu.strecken||{}; let soll=0,done=0;
  sec.items.forEach(it=>{ const c=effCount(stu,it); soll+=c; done+=Math.min(str[it.id]||0,c); });
  return soll?Math.round(done/soll*100):0; }
function lastActivity(s){
  let max="";
  Object.values(s.items||{}).forEach(it=>{ if(it&&typeof it==="object"&&it.dates) it.dates.forEach(d=>{ if(d>max) max=d; }); });
  (s.adkDates?Object.values(s.adkDates):[]).forEach(d=>{ if(d>max) max=d; });
  return max;
}
function countStunden(s){
  const set=new Set();
  Object.values(s.items||{}).forEach(it=>{ if(it&&typeof it==="object"&&it.dates) it.dates.forEach(d=>set.add(d)); });
  if(s.adkDates) Object.values(s.adkDates).forEach(arr=>(arr||[]).forEach(d=>set.add(d)));
  return set.size;
}
// ── Kosten / Zahlungen ──
function eurFmt(n){
  const v=Math.round((Number(n)||0)*100)/100;
  return v.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €";
}
// UE-Logik: 1 UE = 45 Minuten. Gefahrene Fahrstunden mit Dauer ergeben die UE.
function lessonMinutes(s){
  return (s.drivenLessons||[]).reduce((sum,l)=>sum+(Number(l.minutes)||0),0);
}
function lessonUE(s){
  return lessonMinutes(s)/45;
}
// Preis einer einzelnen Fahrstunde: eigener gespeicherter Preis, sonst Standard
function lessonPricePerUE(l,stdPrice){
  return (l && l.price!=null && l.price!=="") ? Number(l.price) : (Number(stdPrice)||0);
}
function lessonCost(l,stdPrice){
  return ((Number(l.minutes)||0)/45) * lessonPricePerUE(l,stdPrice);
}
// Summe der Fahrstunden-Kosten (jede Stunde mit ihrem eigenen Preis)
function lessonsCharge(s,stdPrice){
  return (s.drivenLessons||[]).reduce((sum,l)=>sum+lessonCost(l,stdPrice),0);
}
// UE auf zwei Nachkommastellen, als Komma-Zahl
function ueFmt(n){
  const v=Math.round((Number(n)||0)*100)/100;
  return v.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2});
}
// Summe der Posten: Fahrstunden (je eigener Preis) + freie Posten
function sumCharges(s,pricePerUE){
  const auto=lessonsCharge(s,pricePerUE);
  const free=(s.costItems||[]).reduce((sum,it)=>sum+(Number(it.amount)||0),0);
  return auto+free;
}
function sumPayments(s){
  return (s.payments||[]).reduce((sum,p)=>sum+(Number(p.amount)||0),0);
}
// Effective box count: per-student override, else template default
function effCount(s,item){
  const c=s.customCounts&&s.customCounts[item.id];
  return (c!==undefined&&c!==null&&c!=="")?Math.max(1,parseInt(c,10)||1):(item.count||1);
}
function fmtD(d){ try{ return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"});}catch(e){return d;} }
function fmtDLong(d){ try{ return new Date(d).toLocaleDateString("de-DE",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric"});}catch(e){return d;} }
// ── Kalender-Datumshelfer ──
function startOfWeek(d){ // Montag 00:00 der Woche von d
  const x=new Date(d); x.setHours(0,0,0,0);
  const day=(x.getDay()+6)%7; // Mo=0 … So=6
  x.setDate(x.getDate()-day);
  return x;
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function ymd(d){ const x=new Date(d); return x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0"); }
function hm(d){ const x=new Date(d); return String(x.getHours()).padStart(2,"0")+":"+String(x.getMinutes()).padStart(2,"0"); }
function weekdayShort(d){ return new Date(d).toLocaleDateString("de-DE",{weekday:"short"}); }
function dayMonth(d){ return new Date(d).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"}); }
function isToday(d){ return ymd(d)===ymd(new Date()); }
// kombiniert ein Datum (YYYY-MM-DD) und Uhrzeit (HH:MM) zu ISO-String
function combineDT(dateStr,timeStr){
  if(!dateStr) return null;
  const t=timeStr||"00:00";
  return new Date(dateStr+"T"+t+":00").toISOString();
}
// Uhrzeit-String + Minuten -> neuer Uhrzeit-String (HH:MM)
function addMinutesToTime(timeStr,mins){
  const t=timeStr||"09:00";
  const [h,m]=t.split(":").map(n=>parseInt(n,10)||0);
  let total=h*60+m+mins;
  total=((total%1440)+1440)%1440;
  return String(Math.floor(total/60)).padStart(2,"0")+":"+String(total%60).padStart(2,"0");
}
// Findet bestätigte Termine, die sich mit dem neuen Zeitraum überschneiden (ignoriert einen Termin per ID)
function findOverlaps(appts, startISO, endISO, ignoreId){
  if(!startISO) return [];
  const s=new Date(startISO).getTime();
  // Ohne Endzeit nehmen wir 45 Min als Standarddauer für die Prüfung an
  const e=endISO ? new Date(endISO).getTime() : s+45*60000;
  return (appts||[]).filter(a=>{
    if(ignoreId && a.id===ignoreId) return false;
    if(a.status==="pending") return false; // Vorschläge blockieren nicht
    const as=new Date(a.start_at).getTime();
    const ae=a.end_at ? new Date(a.end_at).getTime() : as+45*60000;
    return s < ae && as < e; // echte Überlappung
  });
}
// Prüfungsreife: was fehlt noch?
function pruefungsreife(stu,adk,strecken){
  const offeneADK=[]; // Punkte, die noch nicht voll geübt sind
  adk.forEach(sec=>sec.items.forEach(it=>{
    const c=effCount(stu,it); const done=Math.min(adkDone(stu,it),c);
    if(done<c) offeneADK.push({sec:sec.title,label:it.label,done,soll:c});
  }));
  const offeneStrecken=[]; // Stationen mit weniger Durchgängen als gefordert
  strecken.forEach(sec=>sec.items.forEach(it=>{
    const c=effCount(stu,it); const done=(stu.strecken&&stu.strecken[it.id])||0;
    if(done<c) offeneStrecken.push({sec:sec.title,label:it.label,done,soll:c});
  }));
  const theorieOffen=!stu.theorie;
  const total = offeneADK.length+offeneStrecken.length+(theorieOffen?1:0);
  return { offeneADK, offeneStrecken, theorieOffen, total };
}
// Prüfungsreife-Ampel: rot (noch viel offen), gelb (fast fertig), grün (prüfungsreif)
function ampel(stu,adk,strecken){
  const lp=calcLern(stu.items,adk,stu), bp=calcBack(stu,strecken);
  const gesamt=Math.max(lp,bp);
  const theorieOk=!!stu.theorie;
  if(gesamt>=100 && theorieOk) return {stufe:"gruen",farbe:"#12A150",text:"Prüfungsreif"};
  if(gesamt>=80) return {stufe:"gelb",farbe:"#E5A100",text:"Fast so weit"};
  return {stufe:"rot",farbe:"#E5484D",text:"In Ausbildung"};
}

// ── Wischbare Zeile: nach links wischen zeigt Anruf + WhatsApp ──
function SwipeRow({children,tel,vorname,waText}){
  const [dx,setDx]=React.useState(0);
  const startX=React.useRef(0);
  const startY=React.useRef(0);
  const dragging=React.useRef(false);
  const decided=React.useRef(false); // ob die Richtung (horizontal/vertikal) feststeht
  const horizontal=React.useRef(false);
  const ACTION_W=tel?140:0; // ohne Nummer kein Wischen
  function onStart(e){
    if(!tel) return;
    const t=e.touches?e.touches[0]:e;
    startX.current=t.clientX; startY.current=t.clientY;
    dragging.current=true; decided.current=false; horizontal.current=false;
  }
  function onMove(e){
    if(!tel||!dragging.current) return;
    const t=e.touches?e.touches[0]:e;
    const diffX=t.clientX-startX.current;
    const diffY=t.clientY-startY.current;
    if(!decided.current){
      if(Math.abs(diffX)>8||Math.abs(diffY)>8){
        decided.current=true;
        horizontal.current=Math.abs(diffX)>Math.abs(diffY);
      }
    }
    if(horizontal.current){
      if(e.cancelable) e.preventDefault();
      // von der aktuellen Position weiterziehen, nur nach links, mit Begrenzung
      const base = dx<=-ACTION_W ? -ACTION_W : 0;
      const next = Math.min(0, Math.max(-ACTION_W-30, base + diffX));
      setDx(next);
    }
  }
  function onEnd(){
    if(!tel) return;
    dragging.current=false;
    // einrasten: offen, wenn mehr als halbe Aktionsbreite gezogen
    setDx(prev=> prev < -ACTION_W/2 ? -ACTION_W : 0 );
  }
  function close(){ setDx(0); }
  if(!tel) return children;
  const open=dx<0;
  return <div style={{position:"relative",marginBottom:10}}>
    <div style={{position:"relative",overflow:"hidden",borderRadius:16,marginBottom:-10}}>
      {/* Aktionen im Hintergrund, nur sichtbar während/nach dem Wischen */}

// ── Unterschriften-Pad ──
function SignaturePad({onSave,onClear,existing,label}){
  const cvs=React.useRef(null);
  const drawing=React.useRef(false);
  const [hasData,setHasData]=React.useState(!!existing);
  const [showCanvas,setShowCanvas]=React.useState(!existing);

  function getPos(e){
    const r=cvs.current.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:src.clientX-r.left, y:src.clientY-r.top};
  }
  function start(e){ e.preventDefault(); drawing.current=true; const p=getPos(e); const ctx=cvs.current.getContext("2d"); ctx.beginPath(); ctx.moveTo(p.x,p.y); }
  function move(e){ e.preventDefault(); if(!drawing.current) return; const p=getPos(e); const ctx=cvs.current.getContext("2d"); ctx.lineTo(p.x,p.y); ctx.stroke(); }
  function end(e){ e.preventDefault(); drawing.current=false; setHasData(true); }
  function save(){ const url=cvs.current.toDataURL("image/png"); onSave(url); setShowCanvas(false); }
  function clear(){ const ctx=cvs.current.getContext("2d"); ctx.clearRect(0,0,cvs.current.width,cvs.current.height); setHasData(false); if(onClear) onClear(); }
  function edit(){ setShowCanvas(true); setHasData(false); }

  React.useEffect(()=>{
    if(!showCanvas||!cvs.current) return;
    const ctx=cvs.current.getContext("2d");
    ctx.clearRect(0,0,cvs.current.width,cvs.current.height);
    ctx.strokeStyle="#000"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.lineJoin="round";
  },[showCanvas]);

  return <div style={{marginBottom:16}}>
    <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:6}}>{label}</label>
    {!showCanvas&&existing
      ? <div style={{border:"1.5px solid var(--line)",borderRadius:11,overflow:"hidden",background:"#fff",textAlign:"center"}}>
          <img src={existing} alt="Unterschrift" style={{height:64,objectFit:"contain"}}/>
          <button onClick={edit} style={{display:"block",width:"100%",padding:"6px",fontSize:12.5,color:"var(--muted)",borderTop:"1px solid var(--line)"}}>Neu zeichnen</button>
        </div>
      : <div style={{border:"1.5px solid var(--line)",borderRadius:11,overflow:"hidden",background:"#fff"}}>
          <div style={{fontSize:12,color:"var(--muted)",textAlign:"center",padding:"4px",borderBottom:"1px solid var(--line)"}}>Hier unterschreiben</div>
          <canvas ref={cvs} width={440} height={80}
            style={{width:"100%",height:80,touchAction:"none",display:"block",cursor:"crosshair"}}
            onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
            onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
          <div style={{display:"flex",borderTop:"1px solid var(--line)"}}>
            <button onClick={clear} style={{flex:1,padding:"7px",fontSize:12.5,color:"var(--muted)",borderRight:"1px solid var(--line)"}}>Löschen</button>
            <button onClick={save} style={{flex:1,padding:"7px",fontSize:12.5,fontWeight:700,color:"var(--orange-deep)"}} disabled={!hasData}>Übernehmen</button>
          </div>
        </div>}
  </div>;
}

function Auth(){
  const [mode,setMode]=useState("login"); // login | register
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [info,setInfo]=useState("");
  const [schoolList,setSchoolList]=useState([]);
  const [schoolId,setSchoolId]=useState("");      // gewählte Fahrschule
  const [newSchoolName,setNewSchoolName]=useState(""); // falls neue angelegt wird
  const [creatingNew,setCreatingNew]=useState(false);

  useEffect(()=>{
    if(mode==="register" && schoolList.length===0){
      fetchSchoolList().then(list=>{ setSchoolList(list); if(list[0]) setSchoolId(list[0].id); });
    }
  },[mode]);

  async function submit(){
    setErr(""); setInfo("");
    const e=email.trim().toLowerCase();
    if(!e||!pw){ setErr("Bitte E-Mail und Passwort eingeben."); return; }
    if(pw.length<6){ setErr("Das Passwort muss mindestens 6 Zeichen haben."); return; }
    if(mode==="register"){
      if(creatingNew && !newSchoolName.trim()){ setErr("Bitte den Namen deiner Fahrschule eingeben."); return; }
      if(!creatingNew && !schoolId){ setErr("Bitte deine Fahrschule auswählen."); return; }
    }
    setBusy(true);
    try{
      if(mode==="register"){
        const { data, error } = await sb.auth.signUp({ email:e, password:pw });
        if(error){ setErr(uebersetze(error.message)); setBusy(false); return; }
        let newUid = data && data.user && data.user.id;
        // Sicherstellen, dass eine aktive Sitzung besteht (sonst greifen die Zugriffsregeln nicht)
        if(!data.session){
          const { data:si, error:se2 } = await sb.auth.signInWithPassword({ email:e, password:pw });
          if(se2){ setErr(uebersetze(se2.message)); setBusy(false); return; }
          newUid = (si&&si.user&&si.user.id) || newUid;
        }
        // Fahrschule zuordnen (neu anlegen oder bestehende wählen)
        try{
          let sid=schoolId;
          if(creatingNew){ const created=await createSchool(newSchoolName); sid=created.id; }
          if(newUid && sid) await assignSchool(newUid,sid);
        }catch(se){ console.error(se); alert("Hinweis: Die Fahrschule konnte nicht sofort zugeordnet werden. Bitte in den Einstellungen prüfen."); }
        setInfo("Konto erstellt. Du wirst angemeldet…");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email:e, password:pw });
        if(error){ setErr(uebersetze(error.message)); }
      }
    }catch(x){ setErr("Etwas ist schiefgelaufen. Bitte erneut versuchen."); }
    setBusy(false);
  }
  function uebersetze(m){
    if(/Invalid login/i.test(m)) return "E-Mail oder Passwort stimmt nicht.";
    if(/already registered|already exists/i.test(m)) return "Diese E-Mail ist bereits registriert. Bitte anmelden.";
    if(/rate limit/i.test(m)) return "Zu viele Versuche. Bitte kurz warten.";
    return m;
  }

  return <div style={{minHeight:"100vh",background:"var(--orange)",display:"flex",flexDirection:"column"}}>
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>
      <div style={{width:"100%",maxWidth:380}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <img src={DEFAULT_LOGO} alt="Logo" style={{width:84,height:84,borderRadius:"22px",background:"#fff",padding:0,border:"3px solid var(--ink)",objectFit:"cover"}}/>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:26,marginTop:12,color:"var(--ink)"}}>Fahrschul-App</div>
          <div style={{fontSize:12.5,fontWeight:600,letterSpacing:".06em",textTransform:"uppercase",color:"var(--ink-2)",marginTop:2}}>Ausbildung digital</div>
        </div>
        <div style={{background:"#fff",borderRadius:18,border:"2px solid var(--ink)",padding:20,boxShadow:"0 8px 30px rgba(0,0,0,.18)"}}>
          <div style={{display:"flex",gap:4,background:"#EDE6D8",borderRadius:12,padding:4,marginBottom:16}}>
            {[["login","Anmelden"],["register","Registrieren"]].map(([k,l])=>
              <button key={k} onClick={()=>{setMode(k);setErr("");setInfo("");}}
                style={{flex:1,borderRadius:9,padding:"9px 6px",fontFamily:"var(--font-d)",fontWeight:700,fontSize:14,
                  background:mode===k?"var(--ink)":"transparent",color:mode===k?"var(--orange)":"var(--muted)"}}>{l}</button>)}
          </div>
          <div style={{marginBottom:11}}>
            <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11.5,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:4}}>E-Mail</label>
            <input type="email" inputMode="email" autoComplete="email" value={email} onChange={e=>setEmail(e.target.value)}
              style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"12px 13px",fontSize:16}}/>
          </div>
          <div style={{marginBottom:mode==="register"?11:16}}>
            <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11.5,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:4}}>Passwort</label>
            <input type="password" autoComplete={mode==="register"?"new-password":"current-password"} value={pw}
              onChange={e=>setPw(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&mode==="login") submit(); }}
              style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"12px 13px",fontSize:16}}/>
          </div>
          {mode==="register"&&<div style={{marginBottom:16}}>
            <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11.5,letterSpacing:".09em",textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:4}}>Deine Fahrschule</label>
            {!creatingNew
              ? <select value={schoolId} onChange={e=>setSchoolId(e.target.value)}
                  style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"12px 13px",fontSize:16,background:"#fff"}}>
                  {schoolList.length===0&&<option value="">Lädt…</option>}
                  {schoolList.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                </select>
              : <input type="text" value={newSchoolName} onChange={e=>setNewSchoolName(e.target.value)} placeholder="Name deiner Fahrschule"
                  style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:11,padding:"12px 13px",fontSize:16}}/>}
            <button onClick={()=>{setCreatingNew(!creatingNew);setErr("");}}
              style={{marginTop:7,fontSize:12.5,fontWeight:700,color:"var(--orange-deep)",textDecoration:"underline"}}>
              {creatingNew?"« Doch aus Liste wählen":"Meine Fahrschule ist nicht dabei »"}
            </button>
          </div>}
          {err&&<div style={{background:"#FDECEA",color:"#B3362A",borderRadius:10,padding:"9px 11px",fontSize:13,marginBottom:12}}>{err}</div>}
          {info&&<div style={{background:"var(--green-bg)",color:"var(--green)",borderRadius:10,padding:"9px 11px",fontSize:13,marginBottom:12}}>{info}</div>}
          <button className="btn btn-primary btn-block" disabled={busy} onClick={submit} style={{padding:"13px"}}>
            {busy?"Bitte warten…":(mode==="register"?"Konto erstellen":"Anmelden")}
          </button>
          <p style={{fontSize:11.5,color:"var(--muted)",textAlign:"center",marginTop:12,lineHeight:1.5}}>
            Du bleibst angemeldet, bis du dich abmeldest.
          </p>
        </div>
      </div>
    </div>
  </div>;
}

  // Vergangene, einem Schüler zugeordnete, noch nicht erfasste Termine finden
  function pendingPastLessons(){

      if(a.status!=="confirmed") return null;
      const end=a.end_at?new Date(a.end_at).getTime():new Date(a.start_at).getTime()+45*60000;
      if(end>now) return null; // noch nicht vorbei
      // Schüler bestimmen: direkte Verknüpfung, sonst eindeutig über den Namen im Titel
      let stu=a.student_id?students.find(x=>x.id===a.student_id):null;
      if(!stu && a.title) stu=matchStudentByName(a.title);
      if(!stu||!stu._isMine) return null; // nur eigene Schüler
      const handledDriven=(stu.drivenLessons||[]).some(l=>l.apptId===a.id);
      const handledSkip=(stu.dismissedAppts||[]).indexOf(a.id)>=0;
      if(handledDriven||handledSkip) return null;
      // Termin mit ermitteltem Schüler zurückgeben (auch wenn nur über Namen gefunden)
      return {...a, _matchedStudentId:stu.id};
    }).filter(Boolean).sort((a,b)=>a.start_at.localeCompare(b.start_at));

  async function handleImportFiles(fileList){

      for(const f of files){ images.push(await fileToDataUrl(f)); }
      const resp=await fetch("/.netlify/functions/extract-student",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({images}),
      });
      const out=await resp.json();
      if(!resp.ok){ setImportState({busy:false, error:(out&&out.error)||"Auslesen fehlgeschlagen", data:null}); return; }

  // Aus den ausgelesenen Daten einen Schüler anlegen
  async function createStudentFromImport(d){
    const deToIso=(s)=>{ const m=(s||"").match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/); return m?m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0"):""; };
    const draft=newStudent();
    draft.vorname=d.vorname||"";
    draft.name=d.name||"";
    draft.geb=deToIso(d.geburtstag);
    draft.tel=d.handy||d.festnetz||"";
    draft.anschrift=d.adresse||"";
    if(d.sehhilfe) draft.sehhilfe=true;
    if(d.theorie_bestanden) draft.theorie=true;
    // Telefon, Festnetz und E-Mail zusätzlich in den Bemerkungen festhalten
    const extra=[];
    if(d.handy) extra.push("Handy: "+d.handy);
    if(d.festnetz) extra.push("Festnetz: "+d.festnetz);
    if(d.email) extra.push("E-Mail: "+d.email);
    if(d.anmeldedatum) extra.push("Anmeldung: "+d.anmeldedatum);
    if(d.klasse) extra.push("Klasse: "+d.klasse);
    if(d.theorie_bestanden) extra.push("Theorie bestanden: "+d.theorie_bestanden);
    if(extra.length) draft.bemerkungen=extra.join("\n");
    // Bisher gefahrene Fahrstunden als Startwert
    const manualCount=(parseInt(d.uebungsfahrten,10)||0)+(parseInt(d.autobahnfahrten,10)||0)
      +(parseInt(d.ueberlandfahrten,10)||0)+(parseInt(d.beleuchtungsfahrten,10)||0)+(parseInt(d.grundfahraufgaben,10)||0);
    if(manualCount>0) draft.manualHours=String(manualCount);
    const created=await dbInsert(uid,draft);
    if(!created){ alert("Konnte nicht speichern. Internetverbindung prüfen."); return; }
    setStudents(prev=>{ const arr=[...(prev||[]),created]; saveCache(uid,arr); return arr; });
    setActiveId(created.id);
    setImportState(null);
    setView("daten");
  }
  // KI-Helfer: Anweisung an die Funktion schicken, Aktionsvorschlag oder Antwort erhalten
  async function askAssistant(text){
    if(!text||!text.trim()) return;
    setAssistant(a=>({...(a||{}),open:true,busy:true,error:"",input:text,proposal:null,answer:""}));
    try{
      const stdPrice=(pricePerHour===""||pricePerHour==null)?0:Number(pricePerHour);
      // Reichhaltige Übersicht je Schüler, damit der Assistent Fragen beantworten kann
      const roster=(students||[]).filter(s=>s._isMine).map(s=>{
        const charges=sumCharges(s,stdPrice), paid=sumPayments(s);
        const bal=charges-paid;
        const lessons=(s.drivenLessons||[]).length;
        const mins=(s.drivenLessons||[]).reduce((a,l)=>a+(parseInt(l.minutes,10)||0),0);
        return {
          id:s.id,
          vorname:s.vorname||"",
          name:s.name||"",
          telefon:s.tel||"",
          theorie:!!s.theorie,
          adkProzent:Math.round(calcLern(s.items,tpl.adk,s)),
          streckenProzent:Math.round(calcBack(s,tpl.strecken)),
          gesamtProzent:Math.round(gesamtPct(s)),
          fahrstunden:lessons,
          gefahreneMinuten:mins,
          berechnet:Math.round(charges*100)/100,
          bezahlt:Math.round(paid*100)/100,
          offen:Math.round(bal*100)/100,
        };
      });
      const now=new Date();
      const today=now.toISOString().slice(0,10);
      // Katalog der ADK- und Streckenpunkte mitgeben, damit die KI sie eindeutig trifft
      const adkCatalog=[]; (tpl.adk||[]).forEach(sec=>(sec.items||[]).forEach(it=>adkCatalog.push({id:it.id,label:it.label,count:it.count||1})));
      const streckenCatalog=[]; (tpl.strecken||[]).forEach(sec=>(sec.items||[]).forEach(it=>streckenCatalog.push({id:it.id,label:it.label,count:it.count||1})));
      const resp=await fetch("/.netlify/functions/assistant",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({message:text,students:roster,today,adk:adkCatalog,strecken:streckenCatalog,currency:"EUR"}),
      });
      const out=await resp.json();
      if(!resp.ok){ setAssistant(a=>({...(a||{}),busy:false,error:(out&&out.error)||"Anfrage fehlgeschlagen",proposal:null})); return; }
      const r=out.result||{};
      // Wenn der Assistent nur antwortet (keine Aktion), zeigen wir die Antwort
      if(r.action==="antwort"||r.action==="answer"){
        setAssistant(a=>({...(a||{}),busy:false,error:"",proposal:null,answer:r.answer||r.summary||""}));
      }else{
        setAssistant(a=>({...(a||{}),busy:false,error:"",proposal:r,answer:""}));
      }
    }catch(e){
      setAssistant(a=>({...(a||{}),busy:false,error:"Fehler: "+(e.message||"unbekannt")+"\n\nLäuft die App über Netlify mit eingerichteter Funktion?",proposal:null}));
    }
  }
  // Vorgeschlagene Aktion nach Bestätigung ausführen
  function runAssistantAction(p){
    if(!p) { setAssistant(null); return; }
    if(p.action==="fahrstunde"){
      const stu=students.find(s=>s.id===p.studentId);
      if(!stu){ alert("Schüler nicht gefunden. Bitte erneut versuchen."); return; }
      const id="L"+Date.now()+Math.random().toString(36).slice(2,6);
      const minutes=parseInt(p.minutes,10)||0;
      const driven=[...(stu.drivenLessons||[]),{id,date:p.date||today0(),time:p.time||"",minutes,
        price:(pricePerHour===""||pricePerHour==null?null:Number(pricePerHour))}];
      writeStudent({...stu,drivenLessons:driven});
      setActiveId(stu.id);
      setAssistant(null);
      showFlash("✓ Fahrstunde eingetragen");
      return;
    }
    if(p.action==="termin"){
      const minutes=parseInt(p.minutes,10)||45;
      const start=new Date((p.date||today0())+"T"+((p.time||"00:00").length===5?p.time:"00:00")+":00");
      if(isNaN(start.getTime())){ alert("Datum oder Uhrzeit ungültig. Bitte erneut versuchen."); return; }
      const end=new Date(start.getTime()+minutes*60000);
      const stu=p.studentId?students.find(s=>s.id===p.studentId):null;
      addAppt({
        student_id:stu?stu.id:null,
        title:p.title||(stu?dispName(stu):"Termin"),
        start_at:start.toISOString(),
        end_at:end.toISOString(),
        status:"confirmed",
        note:"",
      });
      setAssistant(null);
      setView("kalender");
      showFlash("✓ Termin angelegt");
      return;
    }
    if(p.action==="zahlung"){
      const stu=students.find(s=>s.id===p.studentId);
      if(!stu){ alert("Schüler nicht gefunden. Bitte erneut versuchen."); return; }
      const amount=Number(p.amount);
      if(isNaN(amount)||amount<=0){ alert("Betrag ungültig. Bitte erneut versuchen."); return; }
      const pays=[...(stu.payments||[]),{date:p.date||today0(),amount}];
      writeStudent({...stu,payments:pays});
      setActiveId(stu.id);
      setAssistant(null);
      showFlash("✓ Zahlung erfasst");
      return;
    }
    if(p.action==="adk"||p.action==="strecken"){
      const stu=students.find(s=>s.id===p.studentId);
      if(!stu){ alert("Schüler nicht gefunden. Bitte erneut versuchen."); return; }
      if(!p.targetId){ alert("Punkt nicht erkannt. Bitte erneut versuchen."); return; }
      // Zielwert bestimmen: "voll" -> Soll-Anzahl, sonst konkrete Zahl
      const catalog=(p.action==="adk"?tpl.adk:tpl.strecken)||[];
      let item=null; catalog.forEach(sec=>(sec.items||[]).forEach(it=>{ if(it.id===p.targetId) item=it; }));
      if(!item){ alert("Punkt nicht gefunden. Bitte erneut versuchen."); return; }
      const soll=effCount(stu,item);
      let value;
      if(p.value==="voll"||p.value==="full"||p.value===true) value=soll;
      else { value=parseInt(p.value,10); if(isNaN(value)) value=soll; }
      value=Math.max(0,Math.min(value,soll));
      if(p.action==="adk"){
        const items={...(stu.items||{})}; items[p.targetId]=value;
        writeStudent({...stu,items});
      }else{
        const strecken={...(stu.strecken||{})}; strecken[p.targetId]=value;
        writeStudent({...stu,strecken});
      }
      setActiveId(stu.id);
      setAssistant(null);
      showFlash("✓ Eintrag gespeichert");
      return;
    }
    if(p.action==="schueler"){
      const stu=students.find(s=>s.id===p.studentId);
      if(!stu){ alert("Schüler nicht gefunden. Bitte erneut versuchen."); return; }
      const patch={};
      if(p.field==="tel") patch.tel=p.value||"";
      else if(p.field==="anschrift") patch.anschrift=p.value||"";
      else if(p.field==="bemerkungen"){
        if(p.mode==="anhaengen"){
          const old=(stu.bemerkungen||"").trim();
          patch.bemerkungen=old?(old+"\n"+(p.value||"")):(p.value||"");
        }else patch.bemerkungen=p.value||"";
      }
      else { alert("Dieses Feld kann ich nicht bearbeiten."); return; }
      writeStudent({...stu,...patch});
      setActiveId(stu.id);
      setAssistant(null);
      showFlash("✓ Schüler aktualisiert");
      return;
    }
    setAssistant(null);
  }

  // Vorschlag bestätigen / ablehnen
  async function confirmAppt(id){
    const appt=(appts||[]).find(a=>a.id===id);
    if(appt){
      const clash=findOverlaps(appts,appt.start_at,appt.end_at,id);
      if(clash.length){
        const c=clash[0];
        const cname=apptStudentName(c)||c.title||"Termin";
        const txt="Achtung: Dieser Vorschlag überschneidet sich mit einem bestehenden Termin:\n\n"
          +fmtDLong(c.start_at)+", "+hm(c.start_at)+(c.end_at?" – "+hm(c.end_at):"")+" Uhr · "+cname
          +"\n\nTrotzdem bestätigen?";
        if(!confirm(txt)) return;
      }
    }
    // Automatische Zuordnung: Vorschlag-Name eindeutig zu einem Schüler?
    let matchedStu=null;
    if(appt && !appt.student_id && appt.title){
      matchedStu=matchStudentByName(appt.title);
    }
    const patch={status:"confirmed"};
    if(matchedStu) patch.student_id=matchedStu.id;
    await updateAppt(id,patch);
    // WhatsApp-Bestätigung anbieten, gebündelt für alle Termine dieses Schülers.
    if(appt){
      const stu = matchedStu || (appt.student_id ? students.find(x=>x.id===appt.student_id) : null);
      const thisAppt={...appt,status:"confirmed",student_id:(stu?stu.id:appt.student_id)};
      // Alle bestätigten Termine sammeln, die zu diesem Schüler bzw. Namen gehören (heute oder Zukunft)
      const now=Date.now();
      const keyName=(appt.title||"").toLowerCase().trim();
      const related=(appts||[]).filter(a=>{
        if(a.id===id) return false;
        if(a.status!=="confirmed") return false;
        if(new Date(a.start_at).getTime()<now-3600000) return false; // Vergangenes ignorieren
        if(stu && a.student_id===stu.id) return true;
        if(!stu && keyName && (a.title||"").toLowerCase().trim()===keyName) return true;
        return false;
      });
      const allAppts=[thisAppt,...related].sort((a,b)=>a.start_at.localeCompare(b.start_at));
      setWaPrompt({ appts:allAppts, stu: stu||null });
    }
  }
  // Name aus einem Vorschlag eindeutig einem Schüler zuordnen.
  // Gibt nur zurück, wenn GENAU ein Schüler eindeutig passt, sonst null (kein blindes Raten).
  function matchStudentByName(fullName){
    const norm=s=>(s||"").toLowerCase().replace(/\s+/g," ").trim();
    const target=norm(fullName);
    if(!target) return null;
    const cands=(students||[]).map(s=>{
      const a=norm((s.vorname||"")+" "+(s.name||""));
      const b=norm((s.name||"")+" "+(s.vorname||""));
      return {s, names:[a,b].filter(Boolean)};
    });
    // Zuerst exakte Übereinstimmung (Vorname Nachname oder Nachname Vorname)
    const exact=cands.filter(c=>c.names.indexOf(target)>=0);
    if(exact.length===1) return exact[0].s;
    if(exact.length>1) return null; // mehrdeutig
    return null;
  }

    if(n.startsWith("00")) return n.slice(2);
    if(n.startsWith("0")) return "49"+n.slice(1); // führende 0 -> Deutschland

  // ICS-Kalenderdatei für einen oder mehrere Termine erzeugen
  function buildICS(apptList,stu){
    const list=Array.isArray(apptList)?apptList:[apptList];
    const pad=n=>String(n).padStart(2,"0");
    const toICS=iso=>{ const d=new Date(iso);
      return d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"+pad(d.getUTCHours())+pad(d.getUTCMinutes())+pad(d.getUTCSeconds())+"Z"; };
    const schule=(school&&school.name)||"Fahrschule";
    const name=stu?dispName(stu):"";
    const esc=t=>(t||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
    let body="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Fahrschul-App//DE\r\nCALSCALE:GREGORIAN\r\nMETHOD:PUBLISH\r\n";
    list.forEach((a,i)=>{
      const start=a.start_at;
      const end=a.end_at||new Date(new Date(a.start_at).getTime()+45*60000).toISOString();
      const uid="v3-"+(a.id||Date.now()+"-"+i)+"@fahrschule";
      body+="BEGIN:VEVENT\r\n";
      body+="UID:"+uid+"\r\n";
      body+="DTSTAMP:"+toICS(new Date().toISOString())+"\r\n";
      body+="DTSTART:"+toICS(start)+"\r\n";
      body+="DTEND:"+toICS(end)+"\r\n";
      body+="SUMMARY:"+esc("Fahrstunde "+schule)+"\r\n";
      if(name) body+="DESCRIPTION:"+esc("Fahrstunde für "+name+" bei "+schule)+"\r\n";
      body+="END:VEVENT\r\n";
    });
    body+="END:VCALENDAR\r\n";
    return body;
  }
  function downloadICS(apptList,stu){
    const ics=buildICS(apptList,stu);
    const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="Fahrstunde.ics";
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); },1000);
  }
  // Falls das Gerät Teilen unterstützt, ICS als Datei teilen (z.B. an WhatsApp)
  async function shareICS(apptList,stu){
    const ics=buildICS(apptList,stu);
    try{
      if(navigator.canShare){
        const file=new File([ics],"Fahrstunde.ics",{type:"text/calendar"});
        if(navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Fahrstunde", text:"Dein Termin zum Eintragen in den Kalender"});
          return;
        }
      }
    }catch(e){ /* abgebrochen oder nicht unterstützt */ }
    // Fallback: Datei herunterladen
    downloadICS(apptList,stu);
  }

  /* ── Kopf mit aktivem Schüler ── */

  /* ── ADK ── */

    return <div key={sec.id} className="card sec" style={{borderLeftColor:sec.color}}>
      <button className="sec-head" onClick={()=>setOpenSection(isOpen?null:sec.id)}>
        <div style={{flex:1,minWidth:0}}>
          <div className="sec-title" style={{color:sec.color}}>{sec.title}
            {sec.note&&<span style={{fontSize:10.5,fontWeight:600,color:"var(--muted)",marginLeft:8}}>{sec.note}</span>}
            {note&&!isOpen&&<span title="Notiz vorhanden" style={{marginLeft:7,fontSize:12}}>📝</span>}
          </div>
          <div style={{marginTop:7,maxWidth:240}}><Bar pct={pct} color={sec.color} h={5}/></div>
        </div>
        <div className="sec-meta">
          <span className="sec-pct" style={{color:sec.color}}>{pct}%</span>
          <IcChev open={isOpen}/>
        </div>
      </button>
      {isOpen&&<div>
        {!editCounts&&<div style={{padding:"8px 12px",borderTop:"1px solid var(--line)",display:"flex",justifyContent:"flex-end"}}>

            ? <button className="btn btn-ghost" style={{padding:"6px 12px",fontSize:12.5,color:"#B3362A"}}
                onClick={()=>{ if(confirm('Ganzen Abschnitt "'+sec.title+'" zurücksetzen?')) bulkADKSection(sec,false); }}>Abschnitt zurücksetzen</button>
            : <button className="btn btn-ghost" style={{padding:"6px 12px",fontSize:12.5}}
                onClick={()=>{ if(confirm('Ganzen Abschnitt "'+sec.title+'" abhaken?')) bulkADKSection(sec,true); }}>Alles abhaken</button>}
        </div>}
        {sec.items.map(item=>{
          const cnt=effCount(active,item);
          const done=Math.min(adkDone(active,item),cnt);
          const complete=done>=cnt;
          return <div key={item.id} className="row">
            <div className="row-label" style={complete?{color:"var(--green)",fontWeight:600}:null}>
              {item.label}<span className="row-count">{done}/{cnt}</span>

            {editCounts
              ? <div style={{display:"flex",alignItems:"center",gap:6}}>

              fontSize:14.5,background:"var(--field-bg)",resize:"vertical"}}/>

  function uebRow(title,color,pct,key){
    return <div key={key} style={{display:"flex",alignItems:"center",gap:11,padding:"7px 4px"}}>

  /* ── Fahrstunden-Tagebuch ── */
  function lessonAvg(l){
    const vals=LESSON_FIELDS.map(f=>l.ratings&&l.ratings[f.id]).filter(v=>v);
    if(!vals.length) return null;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  }
  function renderTagebuch(){
    const lessons=active.lessons||[];
    return <div className="pad">
      {studentHeader()}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"0 2px 12px"}}>
        <div>
          <h2 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:20,lineHeight:1}}>Fahrstunden</h2>
          <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{lessons.length} {lessons.length===1?"Eintrag":"Einträge"}</div>
        </div>
        <button className="btn btn-primary" onClick={addLesson}>+ Stunde</button>
      </div>

      {lessons.length===0&&<div className="card" style={{padding:"22px 16px",textAlign:"center"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:16,marginBottom:6}}>Noch keine Fahrstunden</div>
        <div style={{fontSize:13.5,color:"var(--muted)",marginBottom:14}}>Lege für jede Fahrstunde einen Eintrag mit Datum und Bewertung an.</div>
        <button className="btn btn-primary" onClick={addLesson}>+ Erste Stunde eintragen</button>
      </div>}

      {lessons.map((l,idx)=>{
        const avg=lessonAvg(l);
        const avgSmiley = avg==null?null:(avg>=2.5?SMILEYS[0]:avg>=1.75?SMILEYS[1]:SMILEYS[2]);
        const isOpen=openLesson===l.id;
        const rated=LESSON_FIELDS.filter(f=>l.ratings&&l.ratings[f.id]).length;
        return <div key={l.id} className="card" style={{marginBottom:10,overflow:"hidden"}}>
          <button onClick={()=>setOpenLesson(isOpen?null:l.id)}
            style={{width:"100%",display:"flex",alignItems:"center",gap:11,padding:"12px 14px",textAlign:"left",background:"var(--card)"}}>
            <div style={{width:42,height:42,minWidth:42,borderRadius:11,background:"var(--field-bg)",
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>
              {avgSmiley?avgSmiley.emoji:"📝"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:15,lineHeight:1.1}}>
                {lessons.length-idx}. Fahrstunde
              </div>
              <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
                {l.date?fmtDLong(l.date):"kein Datum"}{rated>0?" · "+rated+"/5 bewertet":""}{l.note?" · 📝":""}
              </div>
            </div>
            <IcChev open={isOpen}/>
          </button>

          {isOpen&&<div style={{padding:"0 14px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0 12px"}}>
              <input type="date" value={l.date||""} onChange={e=>updateLesson(l.id,{date:e.target.value})}
                style={{flex:1,border:"1.5px solid var(--line)",borderRadius:10,padding:"9px 11px",fontSize:15,fontWeight:600}}/>
              <button onClick={()=>{ if(confirm("Diese Fahrstunde löschen?")){ deleteLesson(l.id); setOpenLesson(null); } }}
                aria-label="Löschen" style={{flexShrink:0,width:40,height:40,borderRadius:10,border:"1.5px solid #F0CFC9",
                  background:"#FDECEA",color:"#B3362A",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>

            {LESSON_FIELDS.map(f=>{
              const cur=l.ratings&&l.ratings[f.id];
              return <div key={f.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,padding:"7px 0",borderTop:"1px solid var(--line)"}}>
                <span style={{fontSize:13.5,fontWeight:500,flex:1,minWidth:0}}>{f.label}</span>
                <div style={{display:"flex",gap:6,flexShrink:0}}>
                  {SMILEYS.map(sm=>{
                    const on=cur===sm.v;
                    return <button key={sm.v} onClick={()=>setLessonRating(l.id,f.id,on?null:sm.v)}
                      aria-label={f.label+": "+sm.label}
                      style={{width:38,height:38,borderRadius:10,fontSize:19,
                        border:on?"2.5px solid "+sm.color:"2px solid var(--line)",
                        background:on?sm.bg:"var(--card)",
                        filter:on?"none":"grayscale(0.6) opacity(0.55)",transition:"all .12s"}}>{sm.emoji}</button>;
                  })}
                </div>
              </div>;
            })}

            <div style={{marginTop:12}}>
              <label style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:10.5,letterSpacing:".08em",
                textTransform:"uppercase",color:"var(--muted)",display:"block",marginBottom:5}}>Notiz zur Stunde</label>
              <textarea rows={2} defaultValue={l.note||""}
                onBlur={e=>{ if(e.target.value!==(l.note||"")) updateLesson(l.id,{note:e.target.value}); }}
                placeholder="Was lief gut, woran arbeiten…"
                style={{width:"100%",border:"1.5px solid var(--line)",borderRadius:10,padding:"9px 11px",
                  fontSize:14.5,background:"var(--field-bg)",resize:"vertical"}}/>
            </div>
          </div>}
        </div>;
      })}
    </div>;
  }

  function kostenSection(){
    const price=Number(pricePerHour)||0; // Preis pro UE
    const mins=lessonMinutes(active);
    const ue=lessonUE(active);
    const autoSum=lessonsCharge(active,price);
    const charges=sumCharges(active,price);
    const paid=sumPayments(active);
    const open=charges-paid;
    const items=active.costItems||[];
    const pays=active.payments||[];
    const lessons=active.drivenLessons||[];
    function addItem(){
      const label=prompt("Bezeichnung des Postens (z.B. Grundgebühr, Lernmaterial):");
      if(label===null) return;
      const amtStr=prompt("Betrag in Euro:");
      if(amtStr===null) return;
      const amount=parseFloat((amtStr||"").replace(",","."));
      if(isNaN(amount)){ alert("Bitte einen gültigen Betrag eingeben."); return; }
      updateActive({costItems:[...items,{label:label.trim()||"Posten",amount}]});
    }
    function removeItem(idx){
      updateActive({costItems:items.filter((_,i)=>i!==idx)});
    }
    function addLesson(){
      const now=new Date();
      setLessonForm({ date:now.toISOString().slice(0,10), time:"", minutes:45, price:(pricePerHour||"") });
    }
    function removeLesson(id){
      updateActive({drivenLessons:lessons.filter(l=>l.id!==id)});
    }
    function addPayment(){
      const amtStr=prompt("Betrag der Zahlung in Euro:");
      if(amtStr===null) return;
      const amount=parseFloat((amtStr||"").replace(",","."));
      if(isNaN(amount)){ alert("Bitte einen gültigen Betrag eingeben."); return; }
      const today=new Date().toISOString().slice(0,10);
      const dateStr=prompt("Datum der Zahlung (TT.MM.JJJJ):",new Date().toLocaleDateString("de-DE"));
      if(dateStr===null) return;
      let iso=today;
      const m=(dateStr||"").match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if(m){ iso=m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0"); }
      updateActive({payments:[...pays,{date:iso,amount}]});
    }
    function removePayment(idx){
      updateActive({payments:pays.filter((_,i)=>i!==idx)});
    }
    return <div style={{marginTop:8}}>
      <div className="eyebrow" style={{marginTop:0}}>Kosten</div>

      {/* Offener Betrag */}
      <div className="card" style={{padding:"16px",marginBottom:16,textAlign:"center",
        background:open>0?"var(--orange-soft)":"var(--green-bg)",
        border:"1.5px solid "+(open>0?"var(--orange)":"var(--green)")}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",color:"var(--muted)"}}>
          {open>0?"Offener Betrag":(open<0?"Guthaben":"Vollständig bezahlt")}
        </div>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:30,marginTop:3,
          color:open>0?"var(--orange-deep)":"var(--green)"}}>{eurFmt(Math.abs(open))}</div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>
          Gesamt {eurFmt(charges)} · bezahlt {eurFmt(paid)}
        </div>
      </div>

      {/* Gefahrene Fahrstunden mit Dauer */}
      <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:13,color:"var(--muted)",margin:"0 2px 8px",textTransform:"uppercase",letterSpacing:".04em"}}>Gefahrene Fahrstunden</div>
      <div className="card" style={{padding:"6px 14px",marginBottom:10}}>
        {lessons.length===0
          ? <div style={{padding:"11px 0",fontSize:13.5,color:"var(--muted)"}}>Noch keine Fahrstunden erfasst.</div>
          : lessons.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map((l)=>{
              const lp=lessonPricePerUE(l,price);
              const lc=lessonCost(l,price);
              return <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:"1px solid var(--line)"}}>
                <div style={{flex:1,cursor:"pointer"}} onClick={()=>setLessonForm({id:l.id,date:l.date||new Date().toISOString().slice(0,10),time:l.time||"",minutes:l.minutes,price:(l.price!=null?l.price:(pricePerHour||""))})}>
                  <div style={{fontSize:14,fontWeight:600}}>{l.minutes} Min · {ueFmt(l.minutes/45)} UE · {eurFmt(lc)}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{l.date?new Date(l.date).toLocaleDateString("de-DE"):""}{l.time?" · "+l.time+" Uhr":""} · {eurFmt(lp)}/UE{l.fromAppt?" · aus Kalender":""}</div>
                </div>
                <button onClick={()=>removeLesson(l.id)} aria-label="Fahrstunde entfernen"
                  style={{border:"none",background:"none",color:"#B3362A",fontSize:18,padding:"2px 4px",lineHeight:1}}>×</button>
              </div>;
            })}
        {lessons.length>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"11px 0",fontWeight:800,fontFamily:"var(--font-d)"}}>
          <span>Summe</span><span>{mins} Min · {ueFmt(ue)} UE</span>
        </div>}
      </div>
      <button className="btn btn-ghost btn-block" style={{marginBottom:20,color:"var(--orange-deep)"}} onClick={addLesson}>+ Fahrstunde erfassen</button>

      {/* Posten */}
      <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:13,color:"var(--muted)",margin:"0 2px 8px",textTransform:"uppercase",letterSpacing:".04em"}}>Posten</div>
      <div className="card" style={{padding:"6px 14px",marginBottom:14}}>
        {/* Automatischer Fahrstunden-Posten aus UE */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:(items.length?"1px solid var(--line)":"none")}}>
          <div style={{flex:1}}>
            <div style={{fontSize:14,fontWeight:600}}>Fahrstunden</div>
            <div style={{fontSize:12,color:"var(--muted)"}}>{ueFmt(ue)} UE gesamt{price===0?" (kein Standardpreis hinterlegt)":""}</div>
          </div>
          <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15}}>{eurFmt(autoSum)}</div>
        </div>
        {items.map((it,idx)=>
          <div key={idx} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:(idx<items.length-1?"1px solid var(--line)":"none")}}>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600}}>{it.label}</div>
            </div>
            <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15}}>{eurFmt(it.amount)}</div>
            <button onClick={()=>removeItem(idx)} aria-label="Posten entfernen"
              style={{border:"none",background:"none",color:"#B3362A",fontSize:18,padding:"2px 4px",lineHeight:1}}>×</button>
          </div>)}
      </div>
      <button className="btn btn-ghost btn-block" style={{marginBottom:10,color:"var(--orange-deep)"}} onClick={addItem}>+ Posten hinzufügen</button>
      {packages.length>0&&<div style={{marginBottom:20}}>
        <div style={{fontSize:12,color:"var(--muted)",marginBottom:8}}>Oder ein Paket als Grundgebühr übernehmen:</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {packages.map((p,idx)=>
            <button key={idx} className="btn btn-ghost" style={{padding:"8px 12px",fontSize:13}}
              onClick={()=>{
                if(!confirm(p.name+" ("+eurFmt(p.amount)+") als Posten hinzufügen?")) return;
                updateActive({costItems:[...(active.costItems||[]),{label:p.name,amount:p.amount}]});
              }}>{p.name} · {eurFmt(p.amount)}</button>)}
        </div>
      </div>}

      {/* Zahlungen */}
      <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:13,color:"var(--muted)",margin:"0 2px 8px",textTransform:"uppercase",letterSpacing:".04em"}}>Zahlungen</div>
      {pays.length===0
        ? <div className="card" style={{padding:"16px 14px",textAlign:"center",fontSize:13.5,color:"var(--muted)",marginBottom:14}}>Noch keine Zahlungen erfasst.</div>
        : <div className="card" style={{padding:"6px 14px",marginBottom:14}}>
            {pays.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map((p,idx)=>
              <div key={idx} style={{display:"flex",alignItems:"center",gap:10,padding:"11px 0",borderBottom:(idx<pays.length-1?"1px solid var(--line)":"none")}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"var(--green)"}}>{eurFmt(p.amount)}</div>
                  <div style={{fontSize:12,color:"var(--muted)"}}>{p.date?new Date(p.date).toLocaleDateString("de-DE"):""}</div>
                </div>
                <button onClick={()=>removePayment(pays.indexOf(p))} aria-label="Zahlung entfernen"
                  style={{border:"none",background:"none",color:"#B3362A",fontSize:18,padding:"2px 4px",lineHeight:1}}>×</button>
              </div>)}
          </div>}
      <button className="btn btn-ghost btn-block" style={{marginBottom:8,color:"var(--green)"}} onClick={addPayment}>+ Zahlung erfassen</button>

      {price===0&&<p style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.5,margin:"0 2px"}}>
        Tipp: Hinterlege deinen Preis pro UE unter Mehr, Einstellungen, Kosten, dann werden die Fahrstunden automatisch berechnet.
      </p>}
    </div>;
  }

      {f("vorname","Vorname")}
      {f("name","Name")}

            onBlur={e=>{ if(e.target.value!==(active.termin||"")) updateActive({termin:e.target.value}); }}
            style={{flex:1,border:"1.5px solid var(--line)",borderRadius:11,padding:"10px 12px",fontSize:16}}/>

            onClick={()=>updateActive({termin:"",terminLabel:""})}>Löschen</button>}

  /* ── Teilen ── */
  function ShareBox(){
    const [email,setEmail]=useState("");
    const [busy,setBusy]=useState(false);
    const [msg,setMsg]=useState("");
    const shared=active._shared||[];
    async function add(){
      const e=email.trim().toLowerCase();
      if(!e){ return; }
      if(e===session.user.email.toLowerCase()){ setMsg("Das ist deine eigene Adresse."); return; }
      setBusy(true); setMsg("");
      const prof=await findUserByEmail(e);
      setBusy(false);
      if(!prof){ setMsg("Kein Konto mit dieser E-Mail gefunden. Die Person muss sich zuerst einmal in der App registrieren."); return; }
      if(shared.indexOf(prof.id)>=0){ setMsg("Schon freigegeben."); return; }
      const next=[...shared,prof.id];
      await dbShare(active.id,next);
      writeStudent({...active,_shared:next});
      setEmail(""); setMsg("Freigegeben für "+e);
    }
    async function removeShare(uidToRemove){
      const next=shared.filter(x=>x!==uidToRemove);
      await dbShare(active.id,next);
      writeStudent({...active,_shared:next});
    }
    return <div className="card" style={{padding:"13px 14px",marginTop:6}}>
      <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:14,marginBottom:4}}>Mit Kollegin/Kollegen teilen</div>
      <div style={{fontSize:12.5,color:"var(--muted)",marginBottom:10}}>Per E-Mail freigeben. Die Person muss sich einmal in der App registriert haben.</div>
      <div style={{display:"flex",gap:8}}>
        <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="kollege@email.de"
          style={{flex:1,border:"1.5px solid var(--line)",borderRadius:11,padding:"10px 12px",fontSize:16}}/>
        <button className="btn btn-primary" disabled={busy} onClick={add}>{busy?"…":"Teilen"}</button>
      </div>
      {msg&&<div style={{fontSize:12.5,color:"var(--ink-2)",marginTop:8}}>{msg}</div>}
      {shared.length>0&&<div style={{marginTop:10}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:5}}>Freigegeben für {shared.length}</div>
        {shared.map(id=><div key={id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",fontSize:13}}>
          <SharedName id={id}/>
          <button onClick={()=>removeShare(id)} style={{color:"#B3362A",fontWeight:700,fontSize:13,padding:"2px 6px"}}>Entfernen</button>
        </div>)}
      </div>}
    </div>;
  }
  function SharedName({id}){
    const [email,setEmail]=useState("…");
    useEffect(()=>{ let on=true;
      sb.from("profiles").select("email").eq("id",id).maybeSingle().then(({data})=>{ if(on&&data) setEmail(data.email); });
      return ()=>{on=false;};
    },[id]);
    return <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{email}</span>;
  }
