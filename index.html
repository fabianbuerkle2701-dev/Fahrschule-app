function getBookingCodeFromURL(){
  try{
    const u=new URL(window.location.href);
    const q=u.searchParams.get("buchen");
    if(q) return q;
    const h=u.hash||"";
    const m=h.match(/buchen[\/=]([A-Za-z0-9]+)/);
    if(m) return m[1];
  }catch(e){}
  return null;
}

function BookingPage({code}){
  const [info,setInfo]=React.useState(undefined); // undefined=lädt, null=ungültig
  const [week,setWeek]=React.useState(()=>startOfWeek(new Date()));
  const [busy,setBusy]=React.useState([]);
  const [loadingBusy,setLoadingBusy]=React.useState(false);
  const [form,setForm]=React.useState(null); // {date,start,end,name,note}
  const [done,setDone]=React.useState(false);
  const [sending,setSending]=React.useState(false);
  const [err,setErr]=React.useState("");

  React.useEffect(()=>{
    publicBookingInfo(code).then(d=>{
      setInfo(d);
      if(d&&d.color) applySchoolColor(d.color);
    }).catch(()=>setInfo(null));
  },[code]);

  React.useEffect(()=>{
    if(!info) return;
    setLoadingBusy(true);
    const von=startOfWeek(week).toISOString();
    const bis=addDays(startOfWeek(week),7).toISOString();
    publicBusyTimes(code,von,bis).then(rows=>{ setBusy(rows||[]); setLoadingBusy(false); })
      .catch(()=>{ setBusy([]); setLoadingBusy(false); });
  },[info,week,code,done]);

  if(info===undefined) return <Splash text="Lädt…"/>;
  if(info===null) return <div style={{minHeight:"100vh",background:"var(--paper)",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
    <div className="card" style={{padding:"26px 20px",textAlign:"center",maxWidth:380}}>
      <div style={{fontSize:40,marginBottom:8}}>🤔</div>
      <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:18,marginBottom:6}}>Link ungültig</div>
      <div style={{fontSize:14,color:"var(--muted)"}}>Dieser Buchungslink ist nicht gültig. Bitte frag deinen Fahrlehrer nach einem aktuellen Link.</div>
    </div>
  </div>;

  const allDays=[0,1,2,3,4,5,6].map(i=>addDays(startOfWeek(week),i));
  const todayKey=ymd(new Date());
  const days=allDays.filter(d=>ymd(d)>=todayKey); // nur heute und Zukunft
  const weekEnd=addDays(startOfWeek(week),6);
  // Zurückblättern nur erlaubt, solange man nicht schon in der aktuellen Woche ist
  const canGoBack=ymd(startOfWeek(week))>ymd(startOfWeek(new Date()));
  const byDay={};
  busy.forEach(b=>{ const k=ymd(b.start_at); (byDay[k]=byDay[k]||[]).push(b); });

  function openForm(dateStr){
    setForm({ vorname:"", nachname:"", note:"",
      slots:[{ date:dateStr||ymd(new Date()), start:"09:00", end:"10:00" }] });
    setErr("");
  }
  function addSlot(){
    setForm(f=>({...f, slots:[...f.slots, { date:f.slots[f.slots.length-1]?.date||ymd(new Date()), start:"09:00", end:"10:00" }]}));
  }
  function removeSlot(i){
    setForm(f=>({...f, slots:f.slots.filter((_,idx)=>idx!==i)}));
  }
  function updateSlot(i,patch){
    setForm(f=>({...f, slots:f.slots.map((s,idx)=>idx===i?{...s,...patch}:s)}));
  }
  async function send(){
    if(!form.vorname.trim()||!form.nachname.trim()){ setErr("Bitte Vor- und Nachname angeben."); return; }
    if(!form.slots.length){ setErr("Bitte mindestens einen Termin angeben."); return; }
    for(const s of form.slots){
      if(!s.date||!s.start){ setErr("Bitte bei jedem Termin Datum und Uhrzeit angeben."); return; }
      if(ymd(s.date)<ymd(new Date())){ setErr("Bitte bei jedem Termin einen Tag ab heute wählen."); return; }
    }
    setSending(true); setErr("");
    const fullName=(form.vorname.trim()+" "+form.nachname.trim()).trim();
    const results=[]; // sammelt Erfolg/Fehler je Termin
    for(const s of form.slots){
      try{
        await publicProposeAppointment(code, combineDT(s.date,s.start),
          s.end?combineDT(s.date,s.end):null, fullName, form.note||"");
        results.push({ok:true, s});
      }catch(e){
        const msg=String(e&&e.message||"");
        let reason="Konnte nicht gesendet werden";
        if(/OVERLAP/i.test(msg)) reason="schon belegt oder angefragt";
        else if(/NOPAST/i.test(msg)) reason="liegt in der Vergangenheit";
        results.push({ok:false, s, reason});
      }
    }
    setSending(false);
    const ok=results.filter(r=>r.ok).length;
    const fail=results.filter(r=>!r.ok);
    // belegte Zeiten neu laden
    const von=startOfWeek(week).toISOString();
    const bis=addDays(startOfWeek(week),7).toISOString();
    publicBusyTimes(code,von,bis).then(rows=>setBusy(rows||[])).catch(()=>{});
    if(fail.length===0){
      setForm(null); setDone(true);
      setTimeout(()=>setDone(false),4000);
    }else if(ok>0){
      // Einige gingen, einige nicht: nur die fehlgeschlagenen im Formular lassen
      setForm(f=>({...f, slots:fail.map(r=>r.s)}));
      setErr(ok+" Termin"+(ok===1?"":"e")+" gesendet. "+fail.length+" Zeit"+(fail.length===1?"":"en")+" war"+(fail.length===1?"":"en")+" "+fail[0].reason+". Bitte ändern.");
    }else{
      setErr("Diese Zeiten sind "+fail[0].reason+". Bitte andere Uhrzeiten wählen.");
    }
  }

  return <div style={{minHeight:"100vh",background:"var(--paper)"}}>
    <header className="topbar">
      <div className="topbar-row">
        <div className="brand">
          <img src={(info&&info.logo)?info.logo:DEFAULT_LOGO} alt="Logo"/>
          <div>
            <div className="brand-name">{info.school_name||"Fahrschule"}</div>
            <div className="brand-sub">Termin anfragen</div>
          </div>
        </div>
      </div>
    </header>

    <div className="pad">
      {done&&<div className="card" style={{padding:"16px",marginBottom:14,background:"var(--green-bg)",border:"1.5px solid var(--green)"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:16,color:"var(--green)"}}>✓ Vielen Dank!</div>
        <div style={{fontSize:13.5,color:"var(--ink-2)",marginTop:4,lineHeight:1.5}}>Deine Anfrage ist eingegangen. Dein Fahrlehrer prüft den Termin und bestätigt ihn. Du bekommst dann Bescheid.</div>
      </div>}

      <div className="card" style={{padding:"14px 16px",marginBottom:14,background:"var(--orange-soft)",border:"1.5px solid var(--orange)"}}>
        <div style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:14.5,marginBottom:6,color:"var(--orange-deep)"}}>So funktioniert es</div>
        <div style={{fontSize:13.5,lineHeight:1.6,color:"var(--ink-2)"}}>
          1. Tippe auf „+ Termin" und wähle einen freien Tag und eine Uhrzeit.<br/>
          2. Du kannst auch mehrere Wunschtermine auf einmal vorschlagen.<br/>
          3. Dein Fahrlehrer prüft und bestätigt die Termine. Belegte Zeiten siehst du als „belegt".
        </div>
      </div>

      <button className="btn btn-primary btn-block" style={{marginBottom:14}} onClick={()=>openForm()}>+ Termin vorschlagen</button>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
        <button className="btn btn-ghost" style={{padding:"8px 12px",opacity:canGoBack?1:0.35}} disabled={!canGoBack}
          onClick={()=>{ if(canGoBack) setWeek(addDays(startOfWeek(week),-7)); }}>‹</button>
        <div style={{flex:1,textAlign:"center",fontSize:13,fontWeight:700,fontFamily:"var(--font-d)"}}>
          {dayMonth(startOfWeek(week))} – {dayMonth(weekEnd)}.
        </div>
        <button className="btn btn-ghost" style={{padding:"8px 12px"}} onClick={()=>setWeek(addDays(startOfWeek(week),7))}>›</button>
      </div>

      {loadingBusy&&<div style={{textAlign:"center",fontSize:13,color:"var(--muted)",padding:"8px"}}>Lädt…</div>}

      {days.map(d=>{
        const k=ymd(d);
        const list=(byDay[k]||[]).sort((a,b)=>a.start_at.localeCompare(b.start_at));
        const today=isToday(d);
        return <div key={k} className="card" style={{marginBottom:10,overflow:"hidden",border:today?"2px solid var(--orange)":undefined}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",
            background:today?"var(--orange-soft)":"var(--field-bg)",borderBottom:"1px solid var(--line)"}}>
            <div style={{display:"flex",alignItems:"baseline",gap:8}}>
              <span style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:15,textTransform:"capitalize"}}>{weekdayShort(d)}</span>
              <span style={{fontSize:13,color:"var(--muted)"}}>{dayMonth(d)}.</span>
            </div>
            <button onClick={()=>openForm(k)} style={{padding:"6px 12px",borderRadius:8,border:"none",
              background:"var(--orange)",fontSize:13,fontWeight:700,fontFamily:"var(--font-d)",color:"#fff",
              display:"inline-flex",alignItems:"center",gap:5}}>+ Termin</button>
          </div>
          {list.length===0
            ? <div style={{padding:"11px 14px",fontSize:13,color:"var(--muted)"}}>frei</div>
            : <div>{list.map((b,i)=>
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderTop:"1px solid var(--line)"}}>
                  <span style={{minWidth:96,fontFamily:"var(--font-d)",fontWeight:800,fontSize:13.5,fontVariantNumeric:"tabular-nums",color:"var(--muted)"}}>
                    {hm(b.start_at)}{b.end_at?" – "+hm(b.end_at):""}
                  </span>
                  <span style={{flex:1,fontSize:14,color:"var(--muted)"}}>{b.status==="pending"?"angefragt":"belegt"}</span>
                </div>)}</div>}
        </div>;
      })}
    </div>

    {form&&<div onClick={()=>setForm(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--card)",width:"100%",maxWidth:560,
        borderTopLeftRadius:20,borderTopRightRadius:20,padding:"20px 18px calc(20px + env(safe-area-inset-bottom))",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:"var(--line)",borderRadius:99,margin:"0 auto 16px"}}/>
        <h3 style={{fontFamily:"var(--font-d)",fontWeight:800,fontSize:19,marginBottom:16}}>Termin vorschlagen</h3>
        <div style={{display:"flex",gap:10,marginBottom:16}}>
          <div className="field" style={{flex:1}}>
            <label>Vorname</label>
            <input type="text" value={form.vorname} onChange={e=>setForm({...form,vorname:e.target.value})} placeholder="Max"/>
          </div>
          <div className="field" style={{flex:1}}>
            <label>Nachname</label>
            <input type="text" value={form.nachname} onChange={e=>setForm({...form,nachname:e.target.value})} placeholder="Mustermann"/>
          </div>
        </div>
        <div style={{fontFamily:"var(--font-d)",fontWeight:700,fontSize:11,letterSpacing:".08em",textTransform:"uppercase",color:"var(--muted)",marginBottom:8}}>
          Wunschtermine
        </div>
        {form.slots.map((s,i)=>
          <div key={i} style={{border:"1.5px solid var(--line)",borderRadius:12,padding:"12px",marginBottom:10,position:"relative"}}>
            {form.slots.length>1&&<button onClick={()=>removeSlot(i)} aria-label="Entfernen"
              style={{position:"absolute",top:8,right:8,width:24,height:24,borderRadius:6,border:"none",
                background:"var(--field-bg)",color:"#B3362A",fontSize:16,lineHeight:1,display:"inline-flex",alignItems:"center",justifyContent:"center"}}>×</button>}
            <div style={{fontSize:12,fontWeight:700,color:"var(--muted)",marginBottom:8}}>Termin {i+1}</div>
            <div className="field" style={{marginBottom:10}}>
              <label>Datum</label>
              <input type="date" min={ymd(new Date())} value={s.date} onChange={e=>updateSlot(i,{date:e.target.value})}/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <div className="field" style={{flex:1}}><label>Von</label>
                <input type="time" value={s.start} onChange={e=>updateSlot(i,{start:e.target.value})}/></div>
              <div className="field" style={{flex:1}}><label>Bis (optional)</label>
                <input type="time" value={s.end} onChange={e=>updateSlot(i,{end:e.target.value})}/></div>
            </div>
            <div style={{background:"var(--orange-soft)",borderRadius:9,padding:"9px 11px",marginTop:8,fontSize:12.5,lineHeight:1.5,color:"var(--ink)"}}>
              Bitte wähle einen Zeitraum zwischen 45 und 90 Minuten, 60 Minuten sind auch möglich. Für eine erste Fahrstunde sind 60 Minuten empfohlen.
            </div>
          </div>)}
        <button className="btn btn-ghost btn-block" style={{marginBottom:14,gap:6,color:"var(--orange-deep)"}} onClick={addSlot}>
          + Weiteren Termin hinzufügen
        </button>
        <div className="field" style={{marginBottom:16}}>
          <label>Nachricht (optional)</label>
          <input type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="z.B. lieber nachmittags"/>
        </div>
        {err&&<div style={{background:"#FDECEA",color:"#B3362A",borderRadius:10,padding:"9px 11px",fontSize:13,marginBottom:12}}>{err}</div>}
        <button className="btn btn-primary btn-block" style={{marginBottom:10}} disabled={sending} onClick={send}>
          {sending?"Wird gesendet…":(form.slots.length>1?form.slots.length+" Termine vorschlagen":"Vorschlag senden")}
        </button>
        <button className="btn btn-ghost btn-block" onClick={()=>setForm(null)}>Abbrechen</button>
      </div>
    </div>}
  </div>;
}

function Root(){
  const code=getBookingCodeFromURL();
  if(code) return <BookingPage code={code}/>;
  return <App/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><Root/></ErrorBoundary>);
</script>
</body>
</html>
